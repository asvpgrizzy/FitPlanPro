// ============ RECOVERY ENGINE ============
var RECOVERY_HOURS = 60; // full 0->100 in 60h; typical session drop recovers in ~48h
function tickRecovery(){
 var now=Date.now();
 var hrs=(now-state.lastRecoveryUpdate)/3600000;
 if(hrs<=0){state.lastRecoveryUpdate=now;return;}
 var gain=hrs*(100/RECOVERY_HOURS);
 MUSCLES.forEach(function(m){ state.recovery[m]=Math.min(100, (state.recovery[m]||100)+gain); });
 state.lastRecoveryUpdate=now;
}
function applyFatigue(loggedExs){
 // loggedExs: [{ex, setCount}]
 loggedExs.forEach(function(item){
  var ex=item.ex, sc=item.setCount;
  var pd=sc*16, sd=sc*7; // per-set fatigue points
  var prims=[ex.p].concat(ex.p2||[]);
  prims.forEach(function(m){ state.recovery[m]=Math.max(10, state.recovery[m]-pd); });
  (ex.s||[]).forEach(function(m){ state.recovery[m]=Math.max(20, state.recovery[m]-sd); });
 });
}

// ============ STARTING WEIGHT ESTIMATOR ============
function estimateWeight(ex){
 var bw=state.bodyweight||265;
 var exp=(state.profile&&state.profile.exp)||1; // 1 beg 2 int 3 adv
 var n=ex.n.toLowerCase();
 var ratio=null;
 function has(){for(var i=0;i<arguments.length;i++){if(n.indexOf(arguments[i])>-1)return true;}return false;}
 if(has("bench press","chest press")) ratio = ex.p==="triceps" ? [0.3,0.45,0.6] : [0.45,0.7,0.95];
 else if(has("deadlift")) ratio=[0.7,1.05,1.4];
 else if(has("squat","leg press","hack")) ratio=has("leg press")?[1.0,1.5,2.0]:[0.55,0.9,1.25];
 else if(has("shoulder press","overhead","military","push press")) ratio=[0.3,0.45,0.6];
 else if(has("row","pulldown","pull-down")) ratio=[0.4,0.6,0.8];
 else if(has("curl")) ratio=[0.12,0.18,0.25];
 else if(has("extension","pushdown","kickback","raise","fly","flye","pullover","shrug")) ratio=[0.12,0.2,0.3];
 else if(ex.mech==="compound") ratio=[0.3,0.45,0.6];
 if(!ratio) return null;
 var w=bw*ratio[exp-1];
 if(ex.eq==="db"||ex.eq==="kb") w=w*0.4; // per hand
 if(ex.eq==="cb") w=w*0.55;
 if(ex.eq==="bw"||ex.eq==="bd") return null;
 return Math.max(5, Math.round(w/5)*5);
}
function repRange(ex){
 var goal=(state.profile&&state.profile.goal)||"fat";
 if(goal==="strength") return ex.mech==="compound"?[5,8]:[8,10];
 if(goal==="muscle") return [8,12];
 return [12,15]; // fat loss
}
function setsFor(ex){ return ex.mech==="compound"?4:3; }
function restFor(ex){
 var goal=(state.profile&&state.profile.goal)||"fat";
 var base=ex.mech==="compound"?90:50;
 if(goal==="strength") base=ex.mech==="compound"?150:75;
 if(goal==="fat") base=ex.mech==="compound"?70:40;
 return base;
}

// ============ WORKOUT GENERATOR ============
function exCountForSession(){
 var len=(state.profile&&state.profile.sessionLen)||60;
 return len<=45?6:len<=60?8:10;
}
function levelCap(){ var e=(state.profile&&state.profile.exp)||1; return e; }
function eligible(muscle, exclude){
 var cap=levelCap();
 return DB.filter(function(e){
  return e.p===muscle && state.eq[e.eq] && e.lv<=cap && exclude.indexOf(e.id)===-1 && state.recentExIds.indexOf(e.id)===-1;
 });
}
function eligibleLoose(muscle, exclude){
 var cap=levelCap();
 var pool=DB.filter(function(e){ return e.p===muscle && state.eq[e.eq] && e.lv<=cap && exclude.indexOf(e.id)===-1; });
 if(!pool.length) pool=DB.filter(function(e){ return e.p===muscle && state.eq[e.eq] && exclude.indexOf(e.id)===-1; });
 return pool;
}
function pickFrom(pool, preferCompound){
 if(!pool.length) return null;
 var comp=pool.filter(function(e){return e.mech==="compound";});
 var use=(preferCompound&&comp.length)?comp:pool;
 return use[Math.floor(Math.random()*use.length)];
}
function scoreTemplate(t){
 var tot=0,n=0;
 Object.keys(t.muscles).forEach(function(m){ tot+=(state.recovery[m]||100)*t.muscles[m]; n+=t.muscles[m]; });
 return tot/n;
}
function chooseTemplate(){
 var scored=TEMPLATES.map(function(t){return {t:t, sc:scoreTemplate(t)};});
 scored.sort(function(a,b){return b.sc-a.sc;});
 return scored[0].t;
}
function generateWorkout(forceTemplateId){
 tickRecovery();
 var t = forceTemplateId ? TEMPLATES.filter(function(x){return x.id===forceTemplateId;})[0] : chooseTemplate();
 var count=exCountForSession();
 var coreCount=count>=8?2:1;
 var mainCount=count-coreCount;
 // distribute mainCount across template muscles weighted by (weight * freshness)
 var entries=Object.keys(t.muscles).map(function(m){ return {m:m, w:t.muscles[m]*(state.recovery[m]||100)}; });
 var totW=entries.reduce(function(a,e){return a+e.w;},0);
 var alloc={}, assigned=0;
 entries.forEach(function(e){ var c=Math.floor(mainCount*e.w/totW); alloc[e.m]=c; assigned+=c; });
 entries.sort(function(a,b){return b.w-a.w;});
 var i=0;
 while(assigned<mainCount){ alloc[entries[i%entries.length].m]++; assigned++; i++; }
 var chosen=[], exclude=[];
 entries.forEach(function(e){
  for(var k=0;k<alloc[e.m];k++){
   var pool=eligible(e.m, exclude);
   if(!pool.length) pool=eligibleLoose(e.m, exclude);
   var ex=pickFrom(pool, k===0);
   if(ex){ chosen.push(ex); exclude.push(ex.id); }
  }
 });
 for(var c=0;c<coreCount;c++){
  var cpool=eligible("core", exclude); if(!cpool.length) cpool=eligibleLoose("core", exclude);
  var cex=pickFrom(cpool,false);
  if(cex){ chosen.push(cex); exclude.push(cex.id); }
 }
 // warmups: 2 stretches matching template muscles
 var tmuscles=Object.keys(t.muscles);
 var wpool=WARMUPS.filter(function(w){ return tmuscles.indexOf(w.p)>-1; });
 var warm=[]; var wcopy=wpool.slice();
 for(var wi=0; wi<2 && wcopy.length; wi++){ var idx=Math.floor(Math.random()*wcopy.length); warm.push(wcopy.splice(idx,1)[0]); }
 var exs=chosen.map(function(ex){
  var ns=setsFor(ex), rr=repRange(ex);
  var lw=state.lastWeights[ex.n];
  var w = lw ? (lw.next||lw.w) : estimateWeight(ex);
  var sets=[];
  for(var s=0;s<ns;s++) sets.push({w:w||"", r:"", done:false});
  return {id:ex.id, sets:sets, done:false, suggested:w, isNew:!lw};
 });
 state.workout={templateId:t.id, exs:exs, warmups:warm, startedAt:Date.now(), date:new Date().toDateString()};
 state.expandedEx=null;
 save();
}
function getEx(id){ for(var i=0;i<DB.length;i++) if(DB[i].id===id) return DB[i]; return null; }
function getTemplate(id){ return TEMPLATES.filter(function(t){return t.id===id;})[0]; }

function swapExercise(slotIdx){
 var slot=state.workout.exs[slotIdx];
 var ex=getEx(slot.id);
 var exclude=state.workout.exs.map(function(e){return e.id;});
 var pool=eligible(ex.p, exclude);
 if(!pool.length) pool=eligibleLoose(ex.p, exclude);
 if(!pool.length){ alert("No alternatives for "+MLABEL[ex.p]+" with current equipment. Enable more in Settings."); return; }
 var newEx=pool[Math.floor(Math.random()*pool.length)];
 var ns=setsFor(newEx);
 var lw=state.lastWeights[newEx.n];
 var w=lw?(lw.next||lw.w):estimateWeight(newEx);
 var sets=[]; for(var s=0;s<ns;s++) sets.push({w:w||"",r:"",done:false});
 state.workout.exs[slotIdx]={id:newEx.id,sets:sets,done:false,suggested:w,isNew:!lw};
 save(); renderWorkout();
}

function finishWorkout(){
 var w=state.workout; if(!w) return;
 var loggedItems=[], totalSets=0;
 w.exs.forEach(function(slot){
  var ex=getEx(slot.id);
  var doneSets=slot.sets.filter(function(s){return s.done;});
  if(!doneSets.length) return;
  totalSets+=doneSets.length;
  loggedItems.push({ex:ex, setCount:doneSets.length, sets:doneSets});
  // last weights + progression
  var weights=doneSets.map(function(s){return parseFloat(s.w)||0;}).filter(function(x){return x>0;});
  if(weights.length){
   var maxW=Math.max.apply(null,weights);
   var rr=repRange(ex);
   var allTop=doneSets.every(function(s){ var reps=parseInt(s.r)||0; return reps>=rr[1] && (parseFloat(s.w)||0)>0; });
   var lower=["quads","hams","glutes","lowerback"].indexOf(ex.p)>-1;
   state.lastWeights[ex.n]={w:maxW, next: allTop ? maxW+(lower?10:5) : maxW};
  }
 });
 if(!totalSets){ alert("Log at least one set before finishing!"); return; }
 applyFatigue(loggedItems);
 var t=getTemplate(w.templateId);
 state.workoutLog.unshift({
  split:t.label, date:new Date().toLocaleDateString(),
  exs:loggedItems.map(function(li){ return {n:li.ex.n, s:li.setCount, top:Math.max.apply(null,li.sets.map(function(s){return parseFloat(s.w)||0;}))}; }),
  sets:totalSets
 });
 if(state.workoutLog.length>40) state.workoutLog.pop();
 // streak: only bump once per calendar day
 var today=new Date().toDateString();
 if(state.lastFinishDate!==today){ state.streak++; state.lastFinishDate=today; }
 document.getElementById("stk").textContent=state.streak;
 // remember recent exercises (avoid repeats next 2 workouts)
 var ids=w.exs.map(function(e){return e.id;});
 state.recentExIds=(ids.concat(state.recentExIds)).slice(0,20);
 state.workout=null;
 save();
 var el=document.createElement("div");
 el.className="celebrate";
 el.innerHTML='<div style="font-size:64px;margin-bottom:16px">\uD83C\uDFC6</div><div style="font-size:24px;font-weight:800;margin-bottom:8px">Workout Complete!</div><div style="font-size:14px;color:#94A3B8;line-height:1.6">'+t.label+' crushed. '+totalSets+' sets logged.<br>Muscles fatigued and recovery tracking updated.</div>';
 document.body.appendChild(el);
 setTimeout(function(){ el.remove(); renderAll(); setActiveTab("today"); }, 2600);
}

 html+='<div style="background:linear-gradient(135deg,'+t.color+'22,'+t.color+'10);border:1px solid '+t.color+'44;border-radius:14px;padding:14px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">';

 html+=ring(pct,48,5,t.color,'<div style="font-size:11px;font-weight:800;color:'+t.color+'">'+Math.round(pct*100)+'%</div>')+'</div>';

 if(w.warmups && w.warmups.length){

function bindWorkout(host){

 host.querySelectorAll(".rIn").forEach(function(el){ el.onchange=function(){ state.workout.exs[+el.dataset.idx].sets[+el.dataset.si].r=el.value; save(); }; });
 host.querySelectorAll(".sChk").forEach(function(el){ el.onclick=function(){
  var slot=state.workout.exs[+el.dataset.idx];

  '<label class="flab">Prep time (optional)</label><input class="input" id="rc_t" placeholder="20 min">'+

  '<button class="btn" id="saveRec" style="background:#8B5CF6;margin-top:14px">'+icon("check",15,"#fff")+' Save Recipe</button>'+
  '</div></div>';
 bg.style.display="flex";
 var chosenTag="Lunch";
 bg.querySelectorAll(".rcTag").forEach(function(b){ b.onclick=function(){
  chosenTag=b.dataset.t;
  bg.querySelectorAll(".rcTag").forEach(function(x){ var on=x.dataset.t===chosenTag; x.style.border="1px solid "+(on?"#3B82F6":"rgba(255,255,255,.12)"); x.style.background=on?"#3B82F622":"transparent"; x.style.color=on?"#3B82F6":"#64748B"; });
 };});
 document.getElementById("closeRec").onclick=function(){bg.style.display="none";bg.innerHTML="";};
 bg.onclick=function(e){if(e.target===bg){bg.style.display="none";bg.innerHTML="";}};
 document.getElementById("saveRec").onclick=function(){
  var n=document.getElementById("rc_n").value.trim();
  var cal=parseInt(document.getElementById("rc_cal").value)||0;
  var p=parseInt(document.getElementById("rc_p").value)||0;
  var c=parseInt(document.getElementById("rc_c").value)||0;
  var f=parseInt(document.getElementById("rc_f").value)||0;
  var t=document.getElementById("rc_t").value.trim();
  var r=document.getElementById("rc_r").value.trim();
  if(!n){ alert("Give your recipe a name!"); return; }
  if(!cal){ alert("Enter at least calories so tracking works."); return; }
  state.customMeals.unshift({n:n,cal:cal,p:p,c:c,f:f,time:t,tag:chosenTag,recipe:r});
  save();
  bg.style.display="none"; bg.innerHTML="";
  state.mealFilter="My Recipes";
  renderMeals();
 };
}

// ============ PROGRESS TAB ============
function renderProgress(){
 var html='<div class="secHead">Personal Records (from your logs)</div>';
 var names=Object.keys(state.lastWeights);
 if(!names.length){
  html+='<div class="card" style="padding:20px;text-align:center;color:#475569;font-size:13px">Log weights during workouts and your PRs appear here. Suggested next weights update automatically when you hit the top of your rep range.</div>';
 } else {
  names.sort(function(a,b){return state.lastWeights[b].w-state.lastWeights[a].w;}).slice(0,12).forEach(function(n){
   var lw=state.lastWeights[n];
   var up=lw.next>lw.w;
   html+='<div class="card" style="padding:12px 15px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700">'+esc(n)+'</div><div style="font-size:11px;color:#64748B;margin-top:2px">Best: '+lw.w+' lbs'+(up?' \u2192 next: <span style="color:#10B981;font-weight:700">'+lw.next+' lbs</span>':'')+'</div></div>'+(up?'<div class="tag" style="background:#10B98122;color:#10B981">+READY</div>':'')+'</div>';
  });
 }
 html+='<div class="secHead">Body Weight Goal</div>';
 var bw=state.bodyweight, goal=200, start=265;
 var pct=Math.round(Math.max(0,Math.min(100,(start-bw)/(start-goal)*100)));
 html+='<div class="card" style="padding:13px 15px"><div style="display:flex;justify-content:space-between;margin-bottom:7px"><div style="font-size:13px;font-weight:700">'+bw+' lbs</div><div style="font-size:11px;font-weight:700;color:#EF4444">'+pct+'% to '+goal+'</div></div><div class="mbar"><div style="width:'+Math.max(3,pct)+'%;background:#EF4444"></div></div>';
 html+='<div style="display:flex;gap:8px;margin-top:10px"><input class="input" id="bwInput" type="number" inputmode="decimal" placeholder="Update weight..." style="flex:1"><button class="btn" id="bwSave" style="width:auto;padding:10px 18px;background:#EF4444">Save</button></div></div>';
 html+='<div class="secHead">Workout History</div>';
 if(!state.workoutLog.length){ html+='<div class="card" style="padding:20px;text-align:center;color:#475569;font-size:13px">No workouts logged yet.</div>'; }
 else state.workoutLog.forEach(function(w){
  html+='<div class="card" style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700">'+esc(w.split)+'</div><div style="font-size:11px;color:#475569;margin-top:2px">'+w.date+' &middot; '+w.exs.length+' exercises &middot; '+w.sets+' sets</div></div><div style="font-size:11px;color:#10B981;font-weight:700">\u2713</div></div>';
 });
 document.getElementById("s-progress").innerHTML=html;
 document.getElementById("bwSave").onclick=function(){
  var v=parseFloat(document.getElementById("bwInput").value);
  if(v&&v>80&&v<600){ state.bodyweight=v; save(); renderProgress(); }
 };
}

// ============ SETTINGS TAB ============
function renderSettings(){
 var p=state.profile||{};
 var html='<div class="secHead">Your Program</div><div class="card" style="padding:4px 14px">';
 [["Goal",{fat:"Lose Fat",muscle:"Build Muscle",strength:"Get Strong"}[p.goal]||"-"],["Experience",["","Beginner","Intermediate","Advanced"][p.exp]||"-"],["Session",(p.sessionLen||60)+" min"],["Days / week",p.days||"-"]].forEach(function(arr){
  html+='<div style="display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px"><span style="color:#64748B">'+arr[0]+'</span><span style="font-weight:700">'+arr[1]+'</span></div>';
 });
 html+='<button class="btn" id="redoOnb" style="background:#1E293B;margin:12px 0">Edit Program (redo setup)</button></div>';
 html+='<div class="secHead">Equipment Available <span style="color:#334155">(uncheck what is occupied or missing)</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">';
 Object.keys(EQUIP).forEach(function(code){
  var on=state.eq[code];
  html+='<button class="eqBtn eq-btn '+(on?"on":"")+'" data-code="'+code+'">'+EQUIP[code]+'<div style="width:18px;height:18px;border-radius:5px;border:2px solid '+(on?"#3B82F6":"#334155")+';background:'+(on?"#3B82F6":"transparent")+';display:flex;align-items:center;justify-content:center">'+(on?icon("check",11,"#fff",3):"")+'</div></button>';
 });
 html+='</div>';
 html+='<div class="secHead">Recovery Engine</div><div class="card" style="padding:14px"><div style="font-size:12px;color:#94A3B8;line-height:1.6">Muscles recover fully in about 60 hours. Miss a day? Everything recovers more and your next workout automatically gets fuller. Train back-to-back? The engine steers away from sore muscles.</div>';
 html+='<button class="btn" id="resetRec" style="background:#1E293B;margin-top:12px">Reset all muscles to 100% fresh</button></div>';
 html+='<div class="secHead">Data</div><div class="card" style="padding:14px"><div style="font-size:12px;color:#94A3B8;margin-bottom:10px">'+DB.length+' movements loaded &middot; '+state.workoutLog.length+' workouts &middot; '+state.customMeals.length+' custom recipes</div>';
 html+='<button class="btn" id="wipeAll" style="background:transparent;border:1px solid #EF4444;color:#EF4444">Erase everything and start over</button></div>';
 document.getElementById("s-set").innerHTML=html;
 document.getElementById("redoOnb").onclick=function(){
  onbState={step:0,goal:p.goal,exp:p.exp,sessionLen:p.sessionLen,days:p.days};
  document.getElementById("app").style.display="none";
  renderOnboarding();
 };
 document.querySelectorAll(".eqBtn").forEach(function(el){ el.onclick=function(){
  var code=el.dataset.code;
  var next=Object.assign({},state.eq); next[code]=!next[code];
  var on=Object.keys(next).filter(function(k){return next[k];}).length;
  if(on<2) return;
  state.eq=next; save(); renderSettings();
 };});
 document.getElementById("resetRec").onclick=function(){
  MUSCLES.forEach(function(m){state.recovery[m]=100;});
  state.lastRecoveryUpdate=Date.now(); save(); renderToday(); renderSettings();
  alert("All muscles reset to 100% fresh.");
 };
 document.getElementById("wipeAll").onclick=function(){
  if(confirm("Erase ALL data (logs, recipes, profile)? This cannot be undone.")){ localStorage.removeItem("fp3"); location.reload(); }
 };
}

// ============ NAV / BOOT ============
var TAB_LABELS={today:["home","Today"],workout:["dumbbell","Workout"],meals:["utensils","Meals"],progress:["chart","Progress"],set:["sliders","Settings"]};
function renderNav(){
 document.querySelectorAll(".navBtn").forEach(function(btn){
  var t=btn.dataset.tab, info=TAB_LABELS[t], active=state.tab===t;
  btn.className="navBtn"+(active?" active":"");
  btn.innerHTML=icon(info[0],21,active?"#3B82F6":"#475569")+"<span>"+info[1]+"</span>";
  btn.onclick=function(){setActiveTab(t);};
 });
}
function setActiveTab(t){
 state.tab=t;
 document.querySelectorAll(".scr").forEach(function(s){s.classList.remove("on");});
 document.getElementById("s-"+t).classList.add("on");
 if(t==="today") renderToday();
 if(t==="workout") renderWorkout();
 renderNav();
}
function updateHeader(){
 var p=state.profile||{};
 var g={fat:"Fat Loss",muscle:"Muscle Building",strength:"Strength"}[p.goal]||"";
 document.getElementById("phl").textContent=g+" \u00B7 "+["","Beginner","Intermediate","Advanced"][p.exp||1];
 document.getElementById("stk").textContent=state.streak;
}
function renderAll(){ renderToday(); renderWorkout(); renderMeals(); renderProgress(); renderSettings(); renderNav(); }

load();
tickRecovery();
var pr=0;
var sf=document.getElementById("sf");
var si2=setInterval(function(){
 pr+=Math.random()*22+12;
 if(pr>=100){ pr=100; clearInterval(si2);
  setTimeout(function(){
   document.getElementById("splash").style.opacity="0";
   setTimeout(function(){
    document.getElementById("splash").style.display="none";
    if(!state.profile){ renderOnboarding(); }
    else { document.getElementById("app").style.display="flex"; updateHeader(); renderAll(); setActiveTab("today"); }
   },400);
  },150);
 }
 sf.style.width=pr+"%";
},100);
save();
</script>
</body>
</html>
