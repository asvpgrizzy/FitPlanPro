<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitPlan Pro">
<meta name="theme-color" content="#060B14">

<title>FitPlan Pro 3.0</title>
<style>
:root{--bg:#060B14;--bg2:#0F172A;--bg3:#1E293B;--bg4:#162032;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.15);--text:#E2E8F0;--text2:#64748B;--text3:#475569;--blue:#3B82F6;--blue2:#60A5FA;--green:#10B981;--orange:#F59E0B;--red:#EF4444;--purple:#8B5CF6;--st:env(safe-area-inset-top,44px);--sb:env(safe-area-inset-bottom,34px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Display',system-ui,sans-serif}
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
#splash h1{font-size:26px;font-weight:800;margin-top:16px}
#splash p{font-size:13px;color:var(--text2);margin-top:6px}
.sbar{width:150px;height:3px;background:var(--bg3);border-radius:99px;margin-top:24px;overflow:hidden}
.sfill{height:100%;width:0;background:var(--blue);border-radius:99px;transition:width .1s}
#app{display:none;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
#onb{display:none;position:fixed;inset:0;background:var(--bg);z-index:5000;overflow-y:auto;padding:calc(var(--st) + 20px) 22px calc(30px + var(--sb))}
.onb-step{max-width:440px;margin:0 auto}
.onb-title{font-size:24px;font-weight:800;margin:14px 0 6px}
.onb-sub{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:22px}
.onb-opt{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px;border-radius:14px;border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;text-align:left}
.onb-opt.sel{border-color:var(--blue);background:rgba(59,130,246,.13)}
.onb-opt small{display:block;font-size:11px;color:var(--text2);font-weight:500;margin-top:3px}
.onb-dots{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.onb-dot{width:8px;height:8px;border-radius:50%;background:var(--bg3)}
.onb-dot.on{background:var(--blue)}
.top{background:rgba(6,11,20,.95);backdrop-filter:blur(12px);padding:calc(var(--st) + 8px) 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topTitle{font-size:21px;font-weight:800;letter-spacing:-.5px}
.topSub{font-size:11px;color:var(--text2);margin-top:2px}
.streak{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#C47A1A,#E8A030);padding:6px 12px;border-radius:20px}
.scroll{flex:1;overflow-y:auto;padding:16px 14px calc(90px + var(--sb))}
.scr{display:none}
.scr.on{display:block}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(8,12,22,.97);backdrop-filter:blur(16px);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(20px + var(--sb));z-index:100}
.navBtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;padding:4px 0;color:var(--text3);font-family:inherit}
.navBtn.active{color:var(--blue)}
.navBtn span{font-size:9px}
.card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);overflow:hidden;margin-bottom:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:12px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff;width:100%}
.btn:active{transform:scale(.97)}
.btn-outline{background:transparent!important}
.chip{font-size:11px;color:var(--text2);background:rgba(255,255,255,.05);padding:4px 10px;border-radius:14px;display:inline-block}
.tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.secHead{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin:4px 0 10px}
.input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:10px 14px;color:var(--text);font-size:13px;outline:none;font-family:inherit}
.input:focus{border-color:var(--blue)}
label.flab{font-size:11px;color:var(--text2);font-weight:700;display:block;margin:10px 0 5px}
.mbar{height:7px;background:var(--bg3);border-radius:99px;overflow:hidden}
.mbar>div{height:100%;border-radius:99px;transition:width .6s ease}
.ring-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center}
.set-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.set-num{font-size:11px;font-weight:700;color:var(--text3);width:34px}
.winput{width:70px;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:8px 6px;color:var(--text);font-size:13px;font-weight:700;text-align:center;outline:none;font-family:inherit}
.winput:focus{border-color:var(--blue)}
.set-check{width:38px;height:36px;border-radius:9px;border:1px solid var(--border2);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.set-check.done{background:rgba(16,185,129,.15);border-color:var(--green)}
.eq-btn{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:12px;border:1px solid var(--border2);background:var(--bg2);color:var(--text3);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;width:100%}
.eq-btn.on{border-color:var(--blue);background:rgba(59,130,246,.13);color:var(--blue)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:600;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;border:1px solid var(--border2);padding-bottom:var(--sb)}
.celebrate{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px}
.exbody{padding:0 14px 12px;border-top:1px solid rgba(255,255,255,.05)}
.exrow{display:flex;gap:7px;margin-top:10px}
.exbtn{flex:1;padding:9px 8px;border-radius:11px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;font-family:inherit;border:1px solid transparent}
::-webkit-scrollbar{display:none}
</style>
</head>

<script>
// ============ DATA ============
var DB = [{"n":"3/4 Sit-Up","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie down on the floor and secure your feet. Your legs should be bent at the knees. Place your hands behind or to the side of your head. You will begin with your back on the ground.","mech":"compound","cat":"strength"},{"n":"Ab Crunch Machine","eq":"mc","p":"core","p2":[],"s":[],"lv":2,"cue":"Select a light resistance and sit down on the ab machine placing your feet under the pads provided and grabbing the top handles.","mech":"isolation","cat":"strength"},{"n":"Ab Roller","eq":"ot","p":"core","p2":[],"s":["shoulders"],"lv":2,"cue":"Hold the Ab Roller with both hands and kneel on the floor. Now place the ab roller on the floor in front of you so that you are on all your hands and knees (as in a kneeling push up position).","mech":"compound","cat":"strength"},{"n":"Advanced Kettlebell Windmill","eq":"kb","p":"core","p2":[],"s":["glutes","hams","shoulders"],"lv":2,"cue":"Clean and press a kettlebell overhead with one arm. Keeping the kettlebell locked out at all times, push your butt out in the direction of the locked out kettlebell.","mech":"isolation","cat":"strength"},{"n":"Air Bike","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie flat on the floor with your lower back pressed to the ground. For this exercise, you will need to put your hands beside your head.","mech":"compound","cat":"strength"},{"n":"Alternate Hammer Curl","eq":"db","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Stand up with your torso upright and a dumbbell in each hand being held at arms length. The elbows should be close to the torso. The palms of the hands should be facing your torso.","mech":"isolation","cat":"strength"},{"n":"Alternate Heel Touchers","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on the floor with the knees bent and the feet on the floor around 18-24 inches apart. Your arms should be extended by your side. This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Alternate Incline Dumbbell Curl","eq":"db","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Sit down on an incline bench with a dumbbell in each hand being held at arms length. Tip: Keep the elbows close to the torso.This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Alternate Leg Diagonal Bound","eq":"bw","p":"quads","p2":[],"s":["glutes","calves","hams"],"lv":1,"cue":"Assume a comfortable stance with one foot slightly in front of the other. Begin by pushing off with the front leg, driving the opposite knee forward and as high as possible before landing.","mech":"compound","cat":"plyometrics"},{"n":"Alternating Cable Shoulder Press","eq":"cb","p":"shoulders","p2":[],"s":["triceps"],"lv":1,"cue":"Move the cables to the bottom of the tower and select an appropriate weight. Grasp the cables and hold them at shoulder height, palms facing forward. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Alternating Deltoid Raise","eq":"db","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"In a standing position, hold a pair of dumbbells at your side. Keeping your elbows slightly bent, raise the weights directly in front of you to shoulder height, avoiding any swinging or cheating.","mech":"isolation","cat":"strength"},{"n":"Alternating Floor Press","eq":"kb","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Lie on the floor with two kettlebells next to your shoulders. Position one in place on your chest and then the other, gripping the kettlebells on the handle with the palms facing forward.","mech":"compound","cat":"strength"},{"n":"Alternating Hang Clean","eq":"kb","p":"hams","p2":[],"s":["biceps","calves","forearms","glutes","lowerback","traps"],"lv":2,"cue":"Place two kettlebells between your feet. To get in the starting position, push your butt back and look straight ahead.","mech":"compound","cat":"strength"},{"n":"Alternating Kettlebell Press","eq":"kb","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders.","mech":"compound","cat":"strength"},{"n":"Alternating Kettlebell Row","eq":"kb","p":"back","p2":[],"s":["biceps"],"lv":2,"cue":"Place two kettlebells in front of your feet. Bend your knees slightly and push your butt out as much as possible.","mech":"isolation","cat":"strength"},{"n":"Alternating Renegade Row","eq":"kb","p":"back","p2":[],"s":["core","biceps","chest","triceps"],"lv":3,"cue":"Place two kettlebells on the floor about shoulder width apart. Position yourself on your toes and your hands as though you were doing a pushup, with the body straight and extended.","mech":"compound","cat":"strength"},{"n":"Anti-Gravity Press","eq":"bb","p":"shoulders","p2":[],"s":["back","traps","triceps"],"lv":1,"cue":"Place a bar on the ground behind the head of an incline bench. Lay on the bench face down. With a pronated grip, pick the barbell up from the floor.","mech":"compound","cat":"strength"},{"n":"Arnold Dumbbell Press","eq":"db","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"Sit on an exercise bench with back support and hold two dumbbells in front of you at about upper chest level with your palms facing your body and your elbows bent.","mech":"compound","cat":"strength"},{"n":"Around The Worlds","eq":"db","p":"chest","p2":[],"s":["shoulders"],"lv":2,"cue":"Lay down on a flat bench holding a dumbbell in each hand with the palms of the hands facing towards the ceiling. Tip: Your arms should be parallel to the floor and next to your thighs.","mech":"compound","cat":"strength"},{"n":"Atlas Stone Trainer","eq":"ot","p":"lowerback","p2":[],"s":["biceps","forearms","glutes","hams","quads"],"lv":2,"cue":"This trainer is effective for developing Atlas Stone strength for those who don't have access to stones, and are typically made from bar ends or heavy pipe.","mech":"compound","cat":"strongman"},{"n":"Atlas Stones","eq":"ot","p":"lowerback","p2":[],"s":["core","glutes","biceps","calves","forearms","hams","back","quads","traps"],"lv":3,"cue":"Begin with the atlas stone between your feet. Bend at the hips to wrap your arms vertically around the Atlas Stone, attempting to get your fingers underneath the stone.","mech":"compound","cat":"strongman"},{"n":"Axle Deadlift","eq":"ot","p":"lowerback","p2":[],"s":["forearms","glutes","hams","back","quads","traps"],"lv":2,"cue":"Approach the bar so that it is centered over your feet. You feet should be about hip width apart. Bend at the hip to grip the bar at shoulder width, allowing your shoulder blades to protract.","mech":"compound","cat":"strongman"},{"n":"Back Flyes - With Bands","eq":"bd","p":"shoulders","p2":[],"s":["back","triceps"],"lv":1,"cue":"Run a band around a stationary post like that of a squat rack. Grab the band by the handles and stand back so that the tension in the band rises. Extend and lift the arms straight in front of you.","mech":"compound","cat":"strength"},{"n":"Backward Drag","eq":"ot","p":"quads","p2":[],"s":["calves","forearms","glutes","hams","lowerback"],"lv":1,"cue":"Load a sled with the desired weight, attaching a rope or straps to the sled that you can hold onto. Begin the exercise by moving backwards for a given distance.","mech":"compound","cat":"strongman"},{"n":"Backward Medicine Ball Throw","eq":"mb","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"This exercise is best done with a partner. If you lack a partner, the ball can be thrown and retrieved or thrown against a wall.","mech":"compound","cat":"plyometrics"},{"n":"Balance Board","eq":"ot","p":"calves","p2":[],"s":["hams","quads"],"lv":1,"cue":"Place a balance board in front of you. Stand up on it and try to balance yourself. Hold the balance for as long as desired.","mech":"compound","cat":"strength"},{"n":"Ball Leg Curl","eq":"eb","p":"hams","p2":[],"s":["calves","glutes"],"lv":1,"cue":"Begin on the floor laying on your back with your feet on top of the ball. Position the ball so that when your legs are extended your ankles are on top of the ball.","mech":"isolation","cat":"strength"},{"n":"Band Assisted Pull-Up","eq":"ot","p":"back","p2":[],"s":["core","forearms"],"lv":1,"cue":"Choke the band around the center of the pullup bar. You can use different bands to provide varying levels of assistance.","mech":"compound","cat":"strength"},{"n":"Band Good Morning","eq":"bd","p":"hams","p2":[],"s":["glutes","lowerback"],"lv":1,"cue":"Using a 41 inch band, stand on one end, spreading your feet a small amount. Bend at the hips to loop the end of the band behind your neck. This will be your starting position.","mech":"compound","cat":"powerlifting"},{"n":"Band Good Morning (Pull Through)","eq":"bd","p":"hams","p2":[],"s":["glutes","lowerback"],"lv":1,"cue":"Loop the band around a post. Standing a little ways away, loop the opposite end around the neck. Your hands can help hold the band in position.","mech":"compound","cat":"powerlifting"},{"n":"Band Hip Adductions","eq":"bd","p":"glutes","p2":[],"s":[],"lv":1,"cue":"Anchor a band around a solid post or other object. Stand with your left side to the post, and put your right foot through the band, getting it around the ankle.","mech":"isolation","cat":"strength"},{"n":"Band Pull Apart","eq":"bd","p":"shoulders","p2":[],"s":["back","traps"],"lv":1,"cue":"Begin with your arms extended straight out in front of you, holding the band with both hands. Initiate the movement by performing a reverse fly motion, moving your hands out laterally to your sides.","mech":"isolation","cat":"strength"},{"n":"Band Skull Crusher","eq":"bd","p":"triceps","p2":[],"s":[],"lv":1,"cue":"Secure a band to the base of a rack or the bench. Lay on the bench so that the band is lined up with your head.","mech":"isolation","cat":"strength"},{"n":"Barbell Ab Rollout","eq":"bb","p":"core","p2":[],"s":["lowerback","shoulders"],"lv":2,"cue":"For this exercise you will need to get into a pushup position, but instead of having your hands of the floor, you will be grabbing on to an Olympic barbell (loaded with 5-10 lbs on each side) instead....","mech":"compound","cat":"strength"},{"n":"Barbell Ab Rollout - On Knees","eq":"bb","p":"core","p2":[],"s":["lowerback","shoulders"],"lv":3,"cue":"Hold an Olympic barbell loaded with 5-10lbs on each side and kneel on the floor. Now place the barbell on the floor in front of you so that you are on all your hands and knees (as in a kneeling push u...","mech":"compound","cat":"strength"},{"n":"Barbell Bench Press - Medium Grip","eq":"bb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie back on a flat bench. Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold i...","mech":"compound","cat":"strength"},{"n":"Barbell Curl","eq":"bb","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Stand up with your torso upright while holding a barbell at a shoulder-width grip. The palm of your hands should be facing forward and the elbows should be close to the torso.","mech":"isolation","cat":"strength"},{"n":"Barbell Curls Lying Against An Incline","eq":"bb","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Lie against an incline bench, with your arms holding a barbell and hanging down in a horizontal line. This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Barbell Deadlift","eq":"bb","p":"lowerback","p2":[],"s":["calves","forearms","glutes","hams","back","quads","traps"],"lv":2,"cue":"Stand in front of a loaded barbell. While keeping the back as straight as possible, bend your knees, bend forward and grasp the bar using a medium (shoulder width) overhand grip.","mech":"compound","cat":"strength"},{"n":"Barbell Full Squat","eq":"bb","p":"quads","p2":[],"s":["calves","glutes","hams","lowerback"],"lv":2,"cue":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just above shoulder level.","mech":"compound","cat":"strength"},{"n":"Barbell Glute Bridge","eq":"bb","p":"glutes","p2":[],"s":["calves","hams"],"lv":2,"cue":"Begin seated on the ground with a loaded barbell over your legs. Using a fat bar or having a pad on the bar can greatly reduce the discomfort caused by this exercise.","mech":"compound","cat":"powerlifting"},{"n":"Barbell Guillotine Bench Press","eq":"bb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":2,"cue":"Using a medium width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and hold it straight over your neck ...","mech":"compound","cat":"strength"},{"n":"Barbell Hack Squat","eq":"bb","p":"quads","p2":[],"s":["calves","forearms","hams"],"lv":2,"cue":"Stand up straight while holding a barbell behind you at arms length and your feet at shoulder width. Tip: A shoulder width grip is best with the palms of your hands facing back.","mech":"compound","cat":"strength"},{"n":"Barbell Hip Thrust","eq":"bb","p":"glutes","p2":[],"s":["calves","hams"],"lv":2,"cue":"Begin seated on the ground with a bench directly behind you. Have a loaded barbell over your legs.","mech":"compound","cat":"powerlifting"},{"n":"Barbell Incline Bench Press - Medium Grip","eq":"bb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie back on an incline bench. Using a medium-width grip (a grip that creates a 90-degree angle in the middle of the movement between the forearms and the upper arms), lift the bar from the rack and ho...","mech":"compound","cat":"strength"},{"n":"Barbell Incline Shoulder Raise","eq":"bb","p":"shoulders","p2":[],"s":["chest"],"lv":1,"cue":"Lie back on an Incline Bench. Using a medium width grip (a grip that is slightly wider than shoulder width), lift the bar from the rack and hold it straight over you with your arms straight.","mech":"compound","cat":"strength"},{"n":"Barbell Lunge","eq":"bb","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack just below shoulder level.","mech":"compound","cat":"strength"},{"n":"Barbell Rear Delt Row","eq":"bb","p":"shoulders","p2":[],"s":["biceps","back"],"lv":1,"cue":"Stand up straight while holding a barbell using a wide (higher than shoulder width) and overhand (palms facing your body) grip.","mech":"compound","cat":"strength"},{"n":"Barbell Rollout from Bench","eq":"bb","p":"core","p2":[],"s":["glutes","hams","back","shoulders"],"lv":2,"cue":"Place a loaded barbell on the ground, near the end of a bench. Kneel with both legs on the bench, and take a medium to narrow grip on the barbell. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Barbell Seated Calf Raise","eq":"bb","p":"calves","p2":[],"s":[],"lv":1,"cue":"Place a block about 12 inches in front of a flat bench. Sit on the bench and place the ball of your feet on the block.","mech":"isolation","cat":"strength"},{"n":"Barbell Shoulder Press","eq":"bb","p":"shoulders","p2":[],"s":["chest","triceps"],"lv":2,"cue":"Sit on a bench with back support in a squat rack. Position a barbell at a height that is just above your head. Grab the barbell with a pronated grip (palms facing forward).","mech":"compound","cat":"strength"},{"n":"Barbell Shrug","eq":"bb","p":"traps","p2":[],"s":[],"lv":1,"cue":"Stand up straight with your feet at shoulder width as you hold a barbell with both hands in front of you using a pronated grip (palms facing the thighs).","mech":"isolation","cat":"strength"},{"n":"Barbell Shrug Behind The Back","eq":"bb","p":"traps","p2":[],"s":["forearms","back"],"lv":1,"cue":"Stand up straight with your feet at shoulder width as you hold a barbell with both hands behind your back using a pronated grip (palms facing back).","mech":"isolation","ca
