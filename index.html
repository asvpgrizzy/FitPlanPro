,"lv":1,"cue":"While standing upright, hold a barbell plate in both hands at the 3 and 9 o'clock positions. Your palms should be facing each other and your arms should be extended straight out in front of you.","mech":"isolation","cat":"strength"},{"n":"Carioca Quick Step","eq":"bw","p":"glutes","p2":[],"s":["core","calves","hams","quads"],"lv":1,"cue":"Begin with your feet a few inches apart and your left arm up in a relaxed, athletic position. With your right foot, quick step behind and pull the knee up.","mech":"isolation","cat":"plyometrics"},{"n":"Catch and Overhead Throw","eq":"mb","p":"back","p2":[],"s":["core","chest","shoulders"],"lv":1,"cue":"Begin standing while facing a wall or a partner. Using both hands, position the ball behind your head, stretching as much as possible, and forcefully throw the ball forward.","mech":"compound","cat":"plyometrics"},{"n":"Chain Handle Extension","eq":"ot","p":"triceps","p2":[],"s":[],"lv":2,"cue":"You will need two cable handle attachments and a flat bench, as well as chains, for this exercise. Clip the middle of the chains to the handles, and position yourself on the flat bench.","mech":"isolation","cat":"powerlifting"},{"n":"Chain Press","eq":"ot","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":2,"cue":"Begin by connecting the chains to the cable handle attachments. Position yourself on the flat bench in the same position as for a dumbbell press.","mech":"compound","cat":"powerlifting"},{"n":"Chair Squat","eq":"mc","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":1,"cue":"To begin, first set the bar to a position that best matches your height. Once the bar is loaded, step under it and position it across the back of your shoulders.","mech":"compound","cat":"strength"},{"n":"Chest Push from 3 point stance","eq":"mb","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Begin in a three point stance, squatted down with your back flat and one hand on the ground. Place the medicine ball directly in front of you.","mech":"compound","cat":"plyometrics"},{"n":"Chest Push (multiple response)","eq":"mb","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Begin in a kneeling position facing a wall or utilize a partner. Hold the ball with both hands tight into the chest.","mech":"compound","cat":"plyometrics"},{"n":"Chest Push (single response)","eq":"mb","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Begin in a kneeling position holding the medicine ball with both hands tightly into the chest.","mech":"compound","cat":"plyometrics"},{"n":"Chest Push with Run Release","eq":"mb","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Begin in an athletic stance with the knees bent, hips back, and back flat. Hold the medicine ball near your legs. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Chin-Up","eq":"bw","p":"back","p2":[],"s":["biceps","forearms"],"lv":1,"cue":"Grab the pull-up bar with the palms facing your torso and a grip closer than the shoulder width.","mech":"compound","cat":"strength"},{"n":"Circus Bell","eq":"ot","p":"shoulders","p2":[],"s":["forearms","glutes","hams","lowerback","traps","triceps"],"lv":3,"cue":"The circus bell is an oversized dumbbell with a thick handle. Begin with the dumbbell between your feet, and grip the handle with both hands.","mech":"compound","cat":"strongman"},{"n":"Clean","eq":"bb","p":"hams","p2":[],"s":["calves","forearms","glutes","lowerback","quads","shoulders","traps"],"lv":2,"cue":"With a barbell on the floor close to the shins, take an overhand (or hook) grip just outside the legs.","mech":"compound","cat":"olympic weightlifting"},{"n":"Clean Deadlift","eq":"bb","p":"hams","p2":[],"s":["forearms","glutes","lowerback","back","quads","traps"],"lv":1,"cue":"Begin standing with a barbell close to your shins. Your feet should be directly under your hips with your feet turned out slightly.","mech":"compound","cat":"olympic weightlifting"},{"n":"Clean Pull","eq":"bb","p":"quads","p2":[],"s":["forearms","glutes","hams","lowerback","traps"],"lv":2,"cue":"With a barbell on the floor close to the shins, take an overhand or hook grip just outside the legs.","mech":"compound","cat":"olympic weightlifting"},{"n":"Clean Shrug","eq":"bb","p":"traps","p2":[],"s":["forearms","shoulders"],"lv":1,"cue":"Begin with a shoulder width, double overhand or hook grip, with the bar hanging at the mid thigh position. Your back should be straight and inclined slightly forward.","mech":"compound","cat":"olympic weightlifting"},{"n":"Clean and Jerk","eq":"bb","p":"shoulders","p2":[],"s":["core","glutes","hams","lowerback","quads","traps","triceps"],"lv":3,"cue":"With a barbell on the floor close to the shins, take an overhand or hook grip just outside the legs.","mech":"compound","cat":"olympic weightlifting"},{"n":"Clean and Press","eq":"bb","p":"shoulders","p2":[],"s":["core","calves","glutes","hams","lowerback","back","quads","traps","triceps"],"lv":2,"cue":"Assume a shoulder-width stance, with knees inside the arms. Now while keeping the back flat, bend at the knees and hips so that you can grab the bar with the arms fully extended and a pronated grip th...","mech":"compound","cat":"strength"},{"n":"Clean from Blocks","eq":"bb","p":"quads","p2":[],"s":["calves","glutes","hams","shoulders","traps"],"lv":2,"cue":"With a barbell on boxes or stands of the desired height, take an overhand or hook grip just outside the legs.","mech":"compound","cat":"olympic weightlifting"},{"n":"Clock Push-Up","eq":"bw","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":2,"cue":"Move into a prone position on the floor, supporting your weight on your hands and toes. Your arms should be fully extended with the hands around shoulder width.","mech":"compound","cat":"strength"},{"n":"Close-Grip Barbell Bench Press","eq":"bb","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"Lie back on a flat bench. Using a close grip (around shoulder width), lift the bar from the rack and hold it straight over you with your arms locked. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Close-Grip Dumbbell Press","eq":"db","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"Place a dumbbell standing up on a flat bench. Ensuring that the dumbbell stays securely placed at the top of the bench, lie perpendicular to the bench with only your shoulders lying on the surface.","mech":"compound","cat":"strength"},{"n":"Close-Grip EZ-Bar Curl with Band","eq":"bb","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Attach a band to each end of the bar. Take the bar, placing a foot on the middle of the band. Stand upright with a narrow, supinated grip on the EZ bar. The elbows should be close to the torso.","mech":"isolation","cat":"strength"},{"n":"Close-Grip EZ-Bar Press","eq":"bb","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"Lie on a flat bench with an EZ bar loaded to an appropriate weight. Using a narrow grip lift the bar and hold it straight over your torso with your elbows in.","mech":"compound","cat":"strength"},{"n":"Close-Grip EZ Bar Curl","eq":"bb","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Stand up with your torso upright while holding an E-Z Curl Bar at the closer inner handle.","mech":"isolation","cat":"strength"},{"n":"Close-Grip Front Lat Pulldown","eq":"cb","p":"back","p2":[],"s":["biceps","shoulders"],"lv":1,"cue":"Sit down on a pull-down machine with a wide bar attached to the top pulley. Make sure that you adjust the knee pad of the machine to fit your height.","mech":"compound","cat":"strength"},{"n":"Close-Grip Push-Up off of a Dumbbell","eq":"bw","p":"triceps","p2":[],"s":["core","chest","shoulders"],"lv":2,"cue":"Lie on the floor and place your hands on an upright dumbbell. Supporting your weight on your toes and hands, keep your torso rigid and your elbows in with your arms straight.","mech":"compound","cat":"strength"},{"n":"Close-Grip Standing Barbell Curl","eq":"bb","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Hold a barbell with both hands, palms up and a few inches apart. Stand with your torso straight and your head up. Your feet should be about shoulder width and your elbows close to your torso.","mech":"isolation","cat":"strength"},{"n":"Cocoons","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Begin by lying on your back on the ground. Your legs should be straight and your arms extended behind your head. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Conan's Wheel","eq":"ot","p":"quads","p2":[],"s":["core","biceps","calves","forearms","lowerback","shoulders","traps"],"lv":2,"cue":"With the weight loaded, take a zurcher hold on the end of the implement. Place the bar in the crook of the elbow and hold onto your wrist. Try to keep the weight off of the forearms.","mech":"compound","cat":"strongman"},{"n":"Concentration Curls","eq":"db","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Sit down on a flat bench with one dumbbell in front of you between your legs. Your legs should be spread with your knees bent and feet on the floor. Use your right arm to pick the dumbbell up.","mech":"isolation","cat":"strength"},{"n":"Cross-Body Crunch","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie flat on your back and bend your knees about 60 degrees. Keep your feet flat on the floor and place your hands loosely behind your head. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Cross Body Hammer Curl","eq":"db","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Stand up straight with a dumbbell in each hand. Your hands should be down at your side with your palms facing in.","mech":"isolation","cat":"strength"},{"n":"Cross Over - With Bands","eq":"bd","p":"chest","p2":[],"s":["biceps","shoulders"],"lv":1,"cue":"Secure an exercise band around a stationary post. While facing away from the post, grab the handles on both ends of the band and step forward enough to create tension on the band.","mech":"compound","cat":"strength"},{"n":"Crucifix","eq":"ot","p":"shoulders","p2":[],"s":["forearms"],"lv":1,"cue":"In the crucifix, you statically hold weights out to the side for time. While the event can be practiced using dumbbells, it is best to practice with one of the various implements used, such as axes an...","mech":"isolation","cat":"strongman"},{"n":"Crunch - Hands Overhead","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on the floor with your back flat and knees bent with around a 60-degree angle between the hamstrings and the calves.","mech":"isolation","cat":"strength"},{"n":"Crunch - Legs On Exercise Ball","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie flat on your back with your feet resting on an exercise ball and your knees bent at a 90 degree angle. Place your feet three to four inches apart and point your toes inward so they touch.","mech":"isolation","cat":"strength"},{"n":"Crunches","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie flat on your back with your feet flat on the ground, or resting on a bench with your knees bent at a 90 degree angle.","mech":"isolation","cat":"strength"},{"n":"Cuban Press","eq":"db","p":"shoulders","p2":[],"s":["traps"],"lv":2,"cue":"Take a dumbbell in each hand with a pronated grip in a standing position. Raise your upper arms so that they are parallel to the floor, allowing your lower arms to hang in the \"scarecrow\" position.","mech":"compound","cat":"strength"},{"n":"Dead Bug","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Begin lying on your back with your hands extended above you toward the ceiling. Bring your feet, knees, and hips up to 90 degrees.","mech":"compound","cat":"strength"},{"n":"Deadlift with Bands","eq":"bb","p":"lowerback","p2":[],"s":["forearms","glutes","hams","back","quads","traps"],"lv":3,"cue":"To deadlift with short bands, simply loop them over the bar before you start, and step into them to set up.","mech":"compound","cat":"powerlifting"},{"n":"Deadlift with Chains","eq":"bb","p":"lowerback","p2":[],"s":["forearms","glutes","hams","back","quads","traps"],"lv":3,"cue":"You can attach the chains to the sleeves of the bar, or just drape the middle over the bar so there is a greater weight increase as you lift. Approach the bar so that it is centered over your feet.","mech":"compound","cat":"powerlifting"},{"n":"Decline Barbell Bench Press","eq":"bb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Secure your legs at the end of the decline bench and slowly lay down on the bench.","mech":"compound","cat":"strength"},{"n":"Decline Close-Grip Bench To Skull Crusher","eq":"bb","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":2,"cue":"Secure your legs at the end of the decline bench and slowly lay down on the bench.","mech":"compound","cat":"strength"},{"n":"Decline Crunch","eq":"bw","p":"core","p2":[],"s":[],"lv":2,"cue":"Secure your legs at the end of the decline bench and lie down. Now place your hands lightly on either side of your head keeping your elbows in. Tip: Don't lock your fingers behind your head.","mech":"isolation","cat":"strength"},{"n":"Decline Dumbbell Bench Press","eq":"db","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","mech":"compound","cat":"strength"},{"n":"Decline Dumbbell Flyes","eq":"db","p":"chest","p2":[],"s":[],"lv":1,"cue":"Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","mech":"compound","cat":"strength"},{"n":"Decline Dumbbell Triceps Extension","eq":"db","p":"triceps","p2":[],"s":[],"lv":1,"cue":"Secure your legs at the end of the decline bench and lie down with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","mech":"isolation","cat":"strength"},{"n":"Decline EZ Bar Triceps Extension","eq":"bb","p":"triceps","p2":[],"s":[],"lv":1,"cue":"Secure your legs at the end of the decline bench and slowly lay down on the bench.","mech":"isolation","cat":"strength"},{"n":"Decline Oblique Crunch","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Secure your legs at the end of the decline bench and slowly lay down on the bench. Raise your upper body off the bench until your torso is about 35-45 degrees if measured from the floor.","mech":"compound","cat":"strength"},{"n":"Decline Push-Up","eq":"bw","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie on the floor face down and place your hands about 36 inches apart while holding your torso up at arms length. Move your feet up to a box or bench. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Decline Reverse Crunch","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on your back on a decline bench and hold on to the top of the bench with both hands. Don't let your body slip down from this position.","mech":"compound","cat":"strength"},{"n":"Decline Smith Press","eq":"mc","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Place a decline bench underneath the Smith machine. Now place the barbell at a height that you can reach when lying down and your arms are almost fully extended.","mech":"compound","cat":"strength"},{"n":"Deficit Deadlift","eq":"bb","p":"lowerback","p2":[],"s":["forearms","glutes","hams","back","quads","traps"],"lv":2,"cue":"Begin by having a platform or weight plates that you can stand on, usually 1-3 inches in height. Approach the bar so that it is centered over your feet. You feet should be about hip width apart.","mech":"compound","cat":"powerlifting"},{"n":"Depth Jump Leap","eq":"ot","p":"quads","p2":[],"s":["glutes","calves","hams"],"lv":1,"cue":"For this drill you will need two boxes or benches, one 12 to 16 inches high and the other 22 to 26 inches high.","mech":"compound","cat":"plyometrics"},{"n":"Dip Machine","eq":"mc","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"Sit securely in a dip machine, select the weight and firmly grasp the handles. Now keep your elbows in at your sides in order to place emphasis on the triceps.","mech":"compound","cat":"strength"},{"n":"Dips - Chest Version","eq":"ot","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":2,"cue":"For this exercise you will need access to parallel bars. To get yourself into the starting position, hold your body at arms length (arms locked) above the bars.","mech":"compound","cat":"strength"},{"n":"Dips - Triceps Version","eq":"bw","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"To get into the starting position, hold your body at arm's length with your arms nearly locked above the bars. Now, inhale and slowly lower yourself downward.","mech":"compound","cat":"strength"},{"n":"Donkey Calf Raises","eq":"ot","p":"calves","p2":[],"s":[],"lv":2,"cue":"For this exercise you will need access to a donkey calf raise machine. Start by positioning your lower back and hips under the padded lever provided.","mech":"isolation","cat":"strength"},{"n":"Double Kettlebell Alternating Hang Clean","eq":"kb","p":"hams","p2":[],"s":["biceps","calves","forearms","glutes","lowerback","quads","traps"],"lv":2,"cue":"Place two kettlebells between your feet. To get in the starting position, push your butt back and look straight ahead. Clean one kettlebell to your shoulder and hold on to the other kettlebell.","mech":"compound","cat":"strength"},{"n":"Double Kettlebell Jerk","eq":"kb","p":"shoulders","p2":[],"s":["calves","quads","triceps"],"lv":2,"cue":"Hold a kettlebell by the handle in each hand. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders.","mech":"compound","cat":"strength"},{"n":"Double Kettlebell Push Press","eq":"kb","p":"shoulders","p2":[],"s":["calves","quads","triceps"],"lv":2,"cue":"Clean two kettlebells to your shoulders. Squat down a few inches and reverse the motion rapidly. Use the momentum from the legs to drive the kettlebells overhead.","mech":"compound","cat":"strength"},{"n":"Double Kettlebell Snatch","eq":"kb","p":"shoulders","p2":[],"s":["glutes","hams","quads"],"lv":3,"cue":"Place two kettlebells behind your feet. Bend your knees and sit back to pick up the kettlebells. Swing the kettlebells between your legs forcefully and reverse the direction.","mech":"compound","cat":"strength"},{"n":"Double Kettlebell Windmill","eq":"kb","p":"core","p2":[],"s":["glutes","hams","shoulders","triceps"],"lv":2,"cue":"Place a kettlebell in front of your front foot and clean and press a kettlebell overhead with your opposite arm.","mech":"isolation","cat":"strength"},{"n":"Double Leg Butt Kick","eq":"bw","p":"quads","p2":[],"s":["glutes","calves","hams"],"lv":1,"cue":"Begin standing with your knees slightly bent. Quickly squat a short distance, flexing the hips and knees, and immediately extend to jump for maximum vertical height.","mech":"compound","cat":"plyometrics"},{"n":"Downward Facing Balance","eq":"eb","p":"glutes","p2":[],"s":["core","hams"],"lv":2,"cue":"Lie facedown on top of an exercise ball. While resting on your stomach on the ball, walk your hands forward along the floor and lift your legs, extending your elbows and knees.","mech":"isolation","cat":"strength"},{"n":"Drag Curl","eq":"bb","p":"biceps","p2":[],"s":["forearms"],"lv":2,"cue":"Grab a barbell with a supinated grip (palms facing forward) and get your elbows close to your torso and back. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Drop Push","eq":"ot","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":2,"cue":"Position low boxes or other platforms 2-3 feet apart. Move to a pushup position between them, supporting yourself by placing your hands on the boxes.","mech":"compound","cat":"plyometrics"},{"n":"Dumbbell Alternate Bicep Curl","eq":"db","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Stand (torso upright) with a dumbbell in each hand held at arms length. The elbows should be close to the torso and the palms of your hand should be facing your thighs.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Bench Press","eq":"db","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie down on a flat bench with a dumbbell in each hand resting on top of your thighs. The palms of your hands will be facing each other.","mech":"compound","cat":"strength"},{"n":"Dumbbell Bench Press with Neutral Grip","eq":"db","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Take a dumbbell in each hand and lay back onto a flat bench. Your feet should be flat on the floor and your shoulder blades retracted.","mech":"compound","cat":"strength"},{"n":"Dumbbell Bicep Curl","eq":"db","p":"biceps","p2":[],"s":["forearms"],"lv":1,"cue":"Stand up straight with a dumbbell in each hand at arm's length. Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Clean","eq":"db","p":"hams","p2":[],"s":["calves","forearms","glutes","lowerback","quads","shoulders","traps"],"lv":2,"cue":"Begin standing with a dumbbell in each hand with your feet shoulder width apart. Lower the weights to the floor by flexing at the hips and knees, pushing your hips back until the dumbbells reach the f...","mech":"compound","cat":"strength"},{"n":"Dumbbell Floor Press","eq":"db","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":2,"cue":"Lay on the floor holding dumbbells in your hands. Your knees can be bent. Begin with the weights fully extended above you. Lower the weights until your upper arm comes in contact with the floor.","mech":"compound","cat":"powerlifting"},{"n":"Dumbbell Flyes","eq":"db","p":"chest","p2":[],"s":[],"lv":1,"cue":"Lie down on a flat bench with a dumbbell on each hand resting on top of your thighs. The palms of your hand will be facing each other.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Incline Row","eq":"db","p":"back","p2":[],"s":["biceps","forearms","shoulders"],"lv":1,"cue":"Using a neutral grip, lean into an incline bench. Take a dumbbell in each hand with a neutral grip, beginning with the arms straight. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Dumbbell Incline Shoulder Raise","eq":"db","p":"shoulders","p2":[],"s":["triceps"],"lv":1,"cue":"Sit on an Incline Bench while holding a dumbbell on each hand on top of your thighs. Lift your legs up to kick the weights to your shoulders and lean back.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Lunges","eq":"db","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":1,"cue":"Stand with your torso upright holding two dumbbells in your hands by your sides. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Dumbbell Lying One-Arm Rear Lateral Raise","eq":"db","p":"shoulders","p2":[],"s":["back"],"lv":2,"cue":"While holding a dumbbell in one hand, lay with your chest down on a slightly inclined (around 15 degrees when measured from the floor) adjustable bench.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Lying Pronation","eq":"db","p":"forearms","p2":[],"s":[],"lv":2,"cue":"Lie on a flat bench face down with one arm holding a dumbbell and the other hand on top of the bench folded so that you can rest your head on it.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Lying Rear Lateral Raise","eq":"db","p":"shoulders","p2":[],"s":[],"lv":2,"cue":"While holding a dumbbell in each hand, lay with your chest down on a slightly inclined (around 15 degrees when measured from the floor) adjustable bench.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Lying Supination","eq":"db","p":"forearms","p2":[],"s":[],"lv":2,"cue":"Lie sideways on a flat bench with one arm holding a dumbbell and the other hand on top of the bench folded so that you can rest your head on it.","mech":"isolation","cat":"strength"},{"n":"Dumbbell One-Arm Shoulder Press","eq":"db","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"Grab a dumbbell and either sit on a military press bench or a utility bench that has a back support on it as you place the dumbbells upright on top of your thighs or stand up straight.","mech":"compound","cat":"strength"},{"n":"Dumbbell One-Arm Triceps Extension","eq":"db","p":"triceps","p2":[],"s":[],"lv":2,"cue":"Grab a dumbbell and either sit on a military press bench or a utility bench that has a back support on it as you place the dumbbells upright on top of your thighs or stand up straight.","mech":"isolation","cat":"strength"},{"n":"Dumbbell One-Arm Upright Row","eq":"db","p":"shoulders","p2":[],"s":["biceps","traps"],"lv":2,"cue":"Grab a dumbbell and stand up straight with your arm extended in front of you with a slight bend at the elbows and your back straight. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Dumbbell Prone Incline Curl","eq":"db","p":"biceps","p2":[],"s":[],"lv":2,"cue":"Grab a dumbbell on each hand and lie face down on an incline bench with your shoulders near top of the incline.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Raise","eq":"db","p":"shoulders","p2":[],"s":["biceps"],"lv":1,"cue":"Grab a dumbbell in each arm and stand up straight with your arms extended by your sides with a slight bend at the elbows and your back straight. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Dumbbell Rear Lunge","eq":"db","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"Stand with your torso upright holding two dumbbells in your hands by your sides. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Dumbbell Scaption","eq":"db","p":"shoulders","p2":[],"s":["traps"],"lv":1,"cue":"This corrective exercise strengthens the muscles that stabilize your shoulder blade. Hold a light weight in each hand, hanging at your sides. Your thumbs should pointing up.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Seated Box Jump","eq":"db","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"Position a box a couple feet to the side of a bench. Hold a dumbbell to your chest with both hands and seat yourself on the bench facing the box. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Dumbbell Seated One-Leg Calf Raise","eq":"db","p":"calves","p2":[],"s":[],"lv":1,"cue":"Place a block on the floor about 12 inches from a flat bench. Sit on a flat bench and place a dumbbell on your upper left thigh about 3 inches above your knee.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Shoulder Press","eq":"db","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"While holding a dumbbell in each hand, sit on a military press bench or utility bench that has back support. Place the dumbbells upright on top of your thighs.","mech":"compound","cat":"strength"},{"n":"Dumbbell Shrug","eq":"db","p":"traps","p2":[],"s":[],"lv":1,"cue":"Stand erect with a dumbbell on each hand (palms facing your torso), arms extended on the sides. Lift the dumbbells by elevating the shoulders as high as possible while you exhale.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Side Bend","eq":"db","p":"core","p2":[],"s":[],"lv":1,"cue":"Stand up straight while holding a dumbbell on the left hand (palms facing the torso) as you have the right hand holding your waist. Your feet should be placed at shoulder width.","mech":"isolation","cat":"strength"},{"n":"Dumbbell Squat","eq":"db","p":"quads","p2":[],"s":["calves","glutes","hams","lowerback"],"lv":1,"cue":"Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Position your legs using a shoulder width medium stance with the toes slightly pointed out.","mech":"compound","cat":"strength"},{"n":"Dumbbell Squat To A Bench","eq":"db","p":"quads","p2":[],"s":["calves","glutes","hams","lowerback"],"lv":2,"cue":"Stand up straight with a flat bench behind you while holding a dumbbell on each hand (palms facing the side of your legs).","mech":"compound","cat":"strength"},{"n":"Dumbbell Step Ups","eq":"db","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"Stand up straight while holding a dumbbell on each hand (palms facing the side of your legs). Place the right foot on the elevated platform.","mech":"compound","cat":"strength"},{"n":"Dumbbell Tricep Extension -Pronated Grip","eq":"db","p":"triceps","p2":[],"s":[],"lv":1,"cue":"Lie down on a flat bench holding two dumbbells directly above your shoulders. Your arms should be fully extended and form a 90 degree angle from your torso and the floor.","mech":"isolation","cat":"strength"},{"n":"EZ-Bar Curl","eq":"bb","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Stand up straight while holding an EZ curl bar at the wide outer handle. The palms of your hands should be facing forward and slightly tilted inward due to the shape of the bar.","mech":"isolation","cat":"strength"},{"n":"EZ-Bar Skullcrusher","eq":"bb","p":"triceps","p2":[],"s":["forearms"],"lv":1,"cue":"Using a close grip, lift the EZ bar and hold it with your elbows in as you lie on the bench. Your arms should be perpendicular to the floor. This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Elbow to Knee","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on the floor, crossing your right leg across your bent left knee. Clasp your hands behind your head, beginning with your shoulder blades on the ground. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Elevated Back Lunge","eq":"bb","p":"quads","p2":[],"s":["glutes","hams"],"lv":2,"cue":"Position a bar onto a rack at shoulder height loaded to an appropriate weight. Place a short, raised platform behind you. Rack the bar onto your upper back, keeping your back arched and tight.","mech":"compound","cat":"strength"},{"n":"Elevated Cable Rows","eq":"cb","p":"back","p2":[],"s":["traps"],"lv":2,"cue":"Get a platform of some sort (it can be an aerobics or calf raise platform) that is around 4-6 inches in height. Place it on the seat of the cable row machine.","mech":"compound","cat":"strength"},{"n":"Exercise Ball Crunch","eq":"eb","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on an exercise ball with your lower back curvature pressed against the spherical surface of the ball. Your feet should be bent at the knee and pressed firmly against the floor.","mech":"isolation","cat":"strength"},{"n":"Exercise Ball Pull-In","eq":"eb","p":"core","p2":[],"s":[],"lv":1,"cue":"Place an exercise ball nearby and lay on the floor in front of it with your hands on the floor shoulder width apart in a push-up position. Now place your lower shins on top of an exercise ball.","mech":"compound","cat":"strength"},{"n":"Extended Range One-Arm Kettlebell Floor Press","eq":"kb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie on the floor and position a kettlebell for one arm to press. The kettlebell should be held by the handle.","mech":"compound","cat":"strength"},{"n":"External Rotation","eq":"db","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Lie sideways on a flat bench with one arm holding a dumbbell and the other hand on top of the bench folded so that you can rest your head on it.","mech":"isolation","cat":"strength"},{"n":"External Rotation with Band","eq":"bd","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Choke the band around a post. The band should be at the same height as your elbow. Stand with your left side to the band a couple of feet away.","mech":"compound","cat":"strength"},{"n":"External Rotation with Cable","eq":"cb","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Adjust the cable to the same height as your elbow. Stand with your left side to the band a couple of feet away. Grasp the handle with your right hand, and keep your elbow pressed firmly to your side.","mech":"isolation","cat":"strength"},{"n":"Face Pull","eq":"cb","p":"shoulders","p2":[],"s":["back"],"lv":2,"cue":"Facing a high pulley with a rope or dual handles attached, pull the weight directly towards your face, separating your hands as you do so. Keep your upper arms parallel to the ground.","mech":"compound","cat":"strength"},{"n":"Farmer's Walk","eq":"ot","p":"forearms","p2":[],"s":["core","glutes","hams","lowerback","quads","traps"],"lv":2,"cue":"There are various implements that can be used for the farmers walk. These can also be performed with heavy dumbbells or short bars if these implements aren't available.","mech":"compound","cat":"strongman"},{"n":"Fast Skipping","eq":"bw","p":"quads","p2":[],"s":["glutes","calves","hams"],"lv":1,"cue":"Start in a relaxed position with one leg slightly forward. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Finger Curls","eq":"bb","p":"forearms","p2":[],"s":[],"lv":1,"cue":"Hold a barbell with both hands and your palms facing up; hands spaced about shoulder width. Place your feet flat on the floor, at a distance that is slightly wider than shoulder width apart.","mech":"isolation","cat":"strength"},{"n":"Flat Bench Cable Flyes","eq":"cb","p":"chest","p2":[],"s":[],"lv":2,"cue":"Position a flat bench between two low pulleys so that when you are laying on it, your chest will be lined up with the cable pulleys. Lay flat on the bench and keep your feet on the ground.","mech":"isolation","cat":"strength"},{"n":"Flat Bench Leg Pull-In","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on an exercise mat or a flat bench with your legs off the end. Place your hands either under your glutes with your palms down or by the sides holding on to the bench (or with palms down by the sid...","mech":"compound","cat":"strength"},{"n":"Flat Bench Lying Leg Raise","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie with your back flat on a bench and your legs extended in front of you off the end. Place your hands either under your glutes with your palms down or by the sides holding on to the bench.","mech":"isolation","cat":"strength"},{"n":"Flexor Incline Dumbbell Curls","eq":"db","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Hold the dumbbell towards the side farther from you so that you have more weight on the side closest to you. (This can be done for a good effect on all bicep dumbbell exercises).","mech":"isolation","cat":"strength"},{"n":"Floor Glute-Ham Raise","eq":"bw","p":"hams","p2":[],"s":["calves","glutes"],"lv":2,"cue":"You can use a partner for this exercise or brace your feet under something stable. Begin on your knees with your upper legs and torso upright.","mech":"isolation","cat":"strength"},{"n":"Floor Press","eq":"bb","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":2,"cue":"Adjust the j-hooks so they are at the appropriate height to rack the bar. Begin lying on the floor with your head near the end of a power rack.","mech":"compound","cat":"powerlifting"},{"n":"Floor Press with Chains","eq":"bb","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":2,"cue":"Adjust the j-hooks so they are at the appropriate height to rack the bar. For this exercise, drape the chains directly over the end of the bar, trying to keep the ends away from the plates.","mech":"compound","cat":"powerlifting"},{"n":"Flutter Kicks","eq":"bw","p":"glutes","p2":[],"s":["hams"],"lv":1,"cue":"On a flat bench lie facedown with the hips on the edge of the bench, the legs straight with toes high off the floor and with the arms on top of the bench holding on to the front edge.","mech":"compound","cat":"strength"},{"n":"Forward Drag with Press","eq":"ot","p":"chest","p2":[],"s":["calves","glutes","hams","quads","shoulders","triceps"],"lv":2,"cue":"Attach a dual handled chain or rope attachment to the sled. You should be facing away from the sled, holding a handle in each hand. Begin the movement by moving forward for one step.","mech":"compound","cat":"strongman"},{"n":"Frankenstein Squat","eq":"bb","p":"quads","p2":[],"s":["core","calves","glutes","hams"],"lv":2,"cue":"This drill teaches you the proper positioning of both the bar and your body during the clean and front squat.","mech":"compound","cat":"olympic weightlifting"},{"n":"Freehand Jump Squat","eq":"bw","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"Cross your arms over your chest. With your head up and your back straight, position your feet at shoulder width.","mech":"compound","cat":"strength"},{"n":"Frog Sit-Ups","eq":"bw","p":"core","p2":[],"s":[],"lv":2,"cue":"Lie with your back flat on the floor (or exercise mat) and your legs extended in front of you.","mech":"isolation","cat":"strength"},{"n":"Front Barbell Squat","eq":"bb","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":3,"cue":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set the bar on a rack that best matches your height.","mech":"compound","cat":"strength"},{"n":"Front Barbell Squat To A Bench","eq":"bb","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":3,"cue":"This exercise is best performed inside a squat rack for safety purposes. To begin, first set a flat bench behind you and set the bar on a rack that best matches your height.","mech":"compound","cat":"strength"},{"n":"Front Box Jump","eq":"ot","p":"hams","p2":[],"s":["glutes","calves","quads"],"lv":1,"cue":"Begin with a box of an appropriate height 1-2 feet in front of you. Stand with your feet should width apart. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Front Cable Raise","eq":"cb","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Select the weight on a low pulley machine and grasp the single hand cable attachment that is attached to the low pulley with your left hand.","mech":"isolation","cat":"strength"},{"n":"Front Cone Hops (or hurdle hops)","eq":"ot","p":"quads","p2":[],"s":["glutes","calves","hams"],"lv":1,"cue":"Set up a row of cones or other small barriers, placing them a few feet apart. Stand in front of the first cone with your feet shoulder width apart. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Front Dumbbell Raise","eq":"db","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Pick a couple of dumbbells and stand with a straight torso and the dumbbells on front of your thighs at arms length with the palms of the hand facing your thighs. This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Front Incline Dumbbell Raise","eq":"db","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Sit down on an incline bench with the incline set anywhere between 30 to 60 degrees while holding a dumbbell on each hand.","mech":"isolation","cat":"strength"},{"n":"Front Plate Raise","eq":"ot","p":"shoulders","p2":[],"s":[],"lv":2,"cue":"While standing straight, hold a barbell plate in both hands at the 3 and 9 o'clock positions.","mech":"isolation","cat":"strength"},{"n":"Front Raise And Pullover","eq":"bb","p":"chest","p2":[],"s":["back","shoulders","triceps"],"lv":1,"cue":"Lie on a flat bench while holding a barbell using a palms down grip that is about 15 inches apart.","mech":"compound","cat":"strength"},{"n":"Front Squat (Clean Grip)","eq":"bb","p":"quads","p2":[],"s":["core","glutes","hams"],"lv":2,"cue":"To begin, first set the bar in a rack slightly below shoulder level. Rest the bar on top of the deltoids, pushing into the clavicles, and lightly touching the throat.","mech":"compound","cat":"strength"},{"n":"Front Squats With Two Kettlebells","eq":"kb","p":"quads","p2":[],"s":["calves","glutes"],"lv":2,"cue":"Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders.","mech":"compound","cat":"strength"},{"n":"Front Two-Dumbbell Raise","eq":"db","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Pick a couple of dumbbells and stand with a straight torso and the dumbbells on front of your thighs at arms length with the palms of the hand facing your thighs. This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Full Range-Of-Motion Lat Pulldown","eq":"cb","p":"back","p2":[],"s":["biceps","shoulders"],"lv":2,"cue":"Either standing or seated on a high bench, grasp two stirrup cables that are attached to the high pulleys.","mech":"compound","cat":"strength"},{"n":"Gironda Sternum Chins","eq":"ot","p":"back","p2":[],"s":["biceps"],"lv":2,"cue":"Grasp the pull-up bar with a shoulder width underhand grip. Now hang with your arms fully extended and stick your chest out and lean back.","mech":"compound","cat":"strength"},{"n":"Glute Ham Raise","eq":"mc","p":"hams","p2":[],"s":["calves","glutes"],"lv":2,"cue":"Begin by adjusting the equipment to fit your body. Place your feet against the footplate in between the rollers as you lie facedown. Your knees should be just behind the pad.","mech":"compound","cat":"powerlifting"},{"n":"Glute Kickback","eq":"bw","p":"glutes","p2":[],"s":["hams"],"lv":1,"cue":"Kneel on the floor or an exercise mat and bend at the waist with your arms extended in front of you (perpendicular to the torso) in order to get into a kneeling push-up position but with the arms spac...","mech":"compound","cat":"strength"},{"n":"Goblet Squat","eq":"kb","p":"quads","p2":[],"s":["calves","glutes","hams","shoulders"],"lv":1,"cue":"Stand holding a light kettlebell by the horns close to your chest. This will be your starting position. Squat down between your legs until your hamstrings are on your calves.","mech":"compound","cat":"strength"},{"n":"Good Morning","eq":"bb","p":"hams","p2":[],"s":["core","glutes","lowerback"],"lv":2,"cue":"Begin with a bar on a rack at shoulder height. Rack the bar across the rear of your shoulders as you would a power squat, not on top of your shoulders.","mech":"compound","cat":"powerlifting"},{"n":"Good Morning off Pins","eq":"bb","p":"hams","p2":[],"s":["core","glutes","lowerback"],"lv":2,"cue":"Begin with a bar on a rack at about the same height as your stomach. Bend over underneath the bar and rack the bar across the rear of your shoulders as you would a power squat, not on top of your shou...","mech":"compound","cat":"powerlifting"},{"n":"Gorilla Chin/Crunch","eq":"bw","p":"core","p2":[],"s":["biceps","back"],"lv":2,"cue":"Hang from a chin-up bar using an underhand grip (palms facing you) that is slightly wider than shoulder width.","mech":"compound","cat":"strength"},{"n":"Hack Squat","eq":"mc","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":1,"cue":"Place the back of your torso against the back pad of the machine and hook your shoulders under the shoulder pads provided.","mech":"compound","cat":"strength"},{"n":"Hammer Curls","eq":"db","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Stand up with your torso upright and a dumbbell on each hand being held at arms length. The elbows should be close to the torso. The palms of the hands should be facing your torso.","mech":"isolation","cat":"strength"},{"n":"Hammer Grip Incline DB Bench Press","eq":"db","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie back on an incline bench with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","mech":"compound","cat":"strength"},{"n":"Handstand Push-Ups","eq":"bw","p":"shoulders","p2":[],"s":["triceps"],"lv":3,"cue":"With your back to the wall bend at the waist and place both hands on the floor at shoulder width. Kick yourself up against the wall with your arms straight.","mech":"compound","cat":"strength"},{"n":"Hang Clean","eq":"bb","p":"quads","p2":[],"s":["calves","forearms","glutes","hams","lowerback","shoulders","traps"],"lv":2,"cue":"Begin with a shoulder width, double overhand or hook grip, with the bar hanging at the mid thigh position. Your back should be straight and inclined slightly forward.","mech":"compound","cat":"olympic weightlifting"},{"n":"Hang Clean - Below the Knees","eq":"bb","p":"quads","p2":[],"s":["calves","forearms","glutes","hams","lowerback","shoulders","traps"],"lv":2,"cue":"Begin with a shoulder width, double overhand or hook grip, with the bar hanging just below the knees. Your back should be straight and inclined slightly forward.","mech":"compound","cat":"olympic weightlifting"},{"n":"Hang Snatch","eq":"bb","p":"hams","p2":[],"s":["core","calves","forearms","glutes","lowerback","quads","shoulders","traps"],"lv":3,"cue":"Begin with a wide grip on the bar, with an overhand or hook grip. The feet should be directly below the hips with the feet turned out.","mech":"compound","cat":"olympic weightlifting"},{"n":"Hang Snatch - Below Knees","eq":"bb","p":"hams","p2":[],"s":["core","calves","forearms","glutes","lowerback","quads","shoulders","traps"],"lv":3,"cue":"Begin with a wide grip on the bar, with an overhand or hook grip. The feet should be directly below the hips with the feet turned out.","mech":"compound","cat":"olympic weightlifting"},{"n":"Hanging Bar Good Morning","eq":"bb","p":"hams","p2":[],"s":["core","glutes","lowerback"],"lv":2,"cue":"Begin with a bar on a rack at about the same height as your stomach. Suspend the bar using chains or suspension straps.","mech":"compound","cat":"powerlifting"},{"n":"Hanging Leg Raise","eq":"bw","p":"core","p2":[],"s":[],"lv":3,"cue":"Hang from a chin-up bar with both arms extended at arms length in top of you using either a wide grip or a medium grip. The legs should be straight down with the pelvis rolled slightly backwards.","mech":"isolation","cat":"strength"},{"n":"Hanging Pike","eq":"bw","p":"core","p2":[],"s":[],"lv":3,"cue":"Hang from a chin-up bar with your legs and feet together using an overhand grip (palms facing away from you) that is slightly wider than shoulder width.","mech":"compound","cat":"strength"},{"n":"Heaving Snatch Balance","eq":"bb","p":"quads","p2":[],"s":["core","forearms","glutes","hams","shoulders","triceps"],"lv":2,"cue":"This drill helps you learn the snatch. Begin by holding a light weight across the back of the shoulders.","mech":"compound","cat":"olympic weightlifting"},{"n":"Heavy Bag Thrust","eq":"ot","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Utilize a heavy bag for this exercise. Assume an upright stance next to the bag, with your feet staggered, fairly wide apart. Place your hand on the bag at about chest height.","mech":"compound","cat":"plyometrics"},{"n":"High Cable Curls","eq":"cb","p":"biceps","p2":[],"s":[],"lv":2,"cue":"Stand between a couple of high pulleys and grab a handle in each arm. Position your upper arms in a way that they are parallel to the floor with the palms of your hands facing you.","mech":"compound","cat":"strength"},{"n":"Hip Extension with Bands","eq":"bd","p":"glutes","p2":[],"s":["hams"],"lv":1,"cue":"Secure one end of the band to the lower portion of a post and attach the other to one ankle. Facing the attachment point of the band, hold on to the column to stabilize yourself.","mech":"compound","cat":"strength"},{"n":"Hip Flexion with Band","eq":"bd","p":"quads","p2":[],"s":[],"lv":1,"cue":"Secure one end of the band to the lower portion of a post and attach the other to one ankle. Face away from the attachment point of the band.","mech":"compound","cat":"strength"},{"n":"Hip Lift with Band","eq":"bd","p":"glutes","p2":[],"s":["calves","hams"],"lv":1,"cue":"After choosing a suitable band, lay down in the middle of the rack, after securing the band on either side of you.","mech":"compound","cat":"powerlifting"},{"n":"Hurdle Hops","eq":"ot","p":"hams","p2":[],"s":["glutes","calves"],"lv":1,"cue":"Set up a row of hurdles or other small barriers, placing them a few feet apart. Stand in front of the first hurdle with your feet shoulder width apart. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Hyperextensions (Back Extensions)","eq":"ot","p":"lowerback","p2":[],"s":["glutes","hams"],"lv":1,"cue":"Lie face down on a hyperextension bench, tucking your ankles securely under the footpads.","mech":"isolation","cat":"strength"},{"n":"Hyperextensions With No Hyperextension Bench","eq":"bw","p":"lowerback","p2":[],"s":["glutes","hams"],"lv":2,"cue":"With someone holding down your legs, slide yourself down to the edge a flat bench until your hips hang off the end of the bench. Tip: Your entire upper body should be hanging down towards the floor.","mech":"compound","cat":"strength"},{"n":"Incline Barbell Triceps Extension","eq":"bb","p":"triceps","p2":[],"s":["forearms"],"lv":2,"cue":"Hold a barbell with an overhand grip (palms down) that is a little closer together than shoulder width. Lie back on an incline bench set at any angle between 45-75-degrees.","mech":"isolation","cat":"strength"},{"n":"Incline Bench Pull","eq":"bb","p":"back","p2":[],"s":["shoulders"],"lv":1,"cue":"Grab a dumbbell in each hand and lie face down on an incline bench that is set to an incline that is approximately 30 degrees.","mech":"isolation","cat":"strength"},{"n":"Incline Cable Chest Press","eq":"cb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Adjust the weight to an appropriate amount and be seated, grasping the handles. Your upper arms should be about 45 degrees to the body, with your head and chest up.","mech":"compound","cat":"strength"},{"n":"Incline Cable Flye","eq":"cb","p":"chest","p2":[],"s":["shoulders"],"lv":2,"cue":"To get yourself into the starting position, set the pulleys at the floor level (lowest level possible on the machine that is below your torso).","mech":"isolation","cat":"strength"},{"n":"Incline Dumbbell Bench With Palms Facing In","eq":"db","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie back on an incline bench with a dumbbell on each hand on top of your thighs. The palms of your hand will be facing each other.","mech":"compound","cat":"strength"},{"n":"Incline Dumbbell Curl","eq":"db","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Sit back on an incline bench with a dumbbell in each hand held at arms length. Keep your elbows close to your torso and rotate the palms of your hands until they are facing forward.","mech":"isolation","cat":"strength"},{"n":"Incline Dumbbell Flyes","eq":"db","p":"chest","p2":[],"s":["shoulders"],"lv":1,"cue":"Hold a dumbbell on each hand and lie on an incline bench that is set to an incline angle of no more than 30 degrees. Extend your arms above you with a slight bend at the elbows.","mech":"compound","cat":"strength"},{"n":"Incline Dumbbell Flyes - With A Twist","eq":"db","p":"chest","p2":[],"s":["shoulders"],"lv":1,"cue":"Hold a dumbbell in each hand and lie on an incline bench that is set to an incline angle of no more than 30 degrees. Extend your arms above you with a slight bend at the elbows.","mech":"compound","cat":"strength"},{"n":"Incline Dumbbell Press","eq":"db","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Lie back on an incline bench with a dumbbell in each hand atop your thighs. The palms of your hands will be facing each other.","mech":"compound","cat":"strength"},{"n":"Incline Hammer Curls","eq":"db","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Seat yourself on an incline bench with a dumbbell in each hand. You should pressed firmly against he back with your feet together.","mech":"isolation","cat":"strength"},{"n":"Incline Inner Biceps Curl","eq":"db","p":"biceps","p2":[],"s":[],"lv":1,"cue":"Hold a dumbbell in each hand and lie back on an incline bench. The dumbbells should be at arm's length hanging at your sides and your palms should be facing out. This will be your starting position.","mech":"isolation","cat":"strength"},{"n":"Incline Push-Up","eq":"bw","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Stand facing bench or sturdy elevated platform. Place hands on edge of bench or platform, slightly wider than shoulder width.","mech":"compound","cat":"strength"},{"n":"Incline Push-Up Close-Grip","eq":"bw","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height. Place your hands next to one another on the bar.","mech":"compound","cat":"strength"},{"n":"Incline Push-Up Depth Jump","eq":"ot","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"For this drill you will need a box about 12 inches high, and two thick mats or aerobics steps.","mech":"compound","cat":"plyometrics"},{"n":"Incline Push-Up Medium","eq":"bw","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height. Place your hands on the bar, with your hands about shoulder width apart.","mech":"compound","cat":"strength"},{"n":"Incline Push-Up Reverse Grip","eq":"bw","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height. Place your hands on the bar palms up, with your hands about shoulder width apart.","mech":"compound","cat":"strength"},{"n":"Incline Push-Up Wide","eq":"bw","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Stand facing a Smith machine bar or sturdy elevated platform at an appropriate height. Place your hands on the bar, with your hands wider than shoulder width.","mech":"compound","cat":"strength"},{"n":"Internal Rotation with Band","eq":"bd","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"Choke the band around a post. The band should be at the same height as your elbow. Stand with your right side to the band a couple of feet away.","mech":"isolation","cat":"strength"},{"n":"Inverted Row","eq":"bw","p":"back","p2":[],"s":[],"lv":1,"cue":"Position a bar in a rack to about waist height. You can also use a smith machine. Take a wider than shoulder width grip on the bar and position yourself hanging underneath the bar.","mech":"compound","cat":"strength"},{"n":"Inverted Row with Straps","eq":"ot","p":"back","p2":[],"s":["biceps"],"lv":1,"cue":"Hang a rope or suspension straps from a rack or other stable object. Grasp the ends and position yourself in a supine position hanging from the ropes.","mech":"compound","cat":"strength"},{"n":"Iron Cross","eq":"db","p":"shoulders","p2":[],"s":["chest","glutes","hams","lowerback","quads","traps"],"lv":2,"cue":"","mech":"compound","cat":"strength"},{"n":"Isometric Chest Squeezes","eq":"bw","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"While either seating or standing, bend your arms at a 90-degree angle and place the palms of your hands together in front of your chest.","mech":"compound","cat":"plyometrics"},{"n":"Isometric Neck Exercise - Front And Back","eq":"bw","p":"traps","p2":[],"s":[],"lv":1,"cue":"With your head and neck in a neutral position (normal position with head erect facing forward), place both of your hands on the front side of your head.","mech":"isolation","cat":"strength"},{"n":"Isometric Neck Exercise - Sides","eq":"bw","p":"traps","p2":[],"s":[],"lv":1,"cue":"With your head and neck in a neutral position (normal position with head erect facing forward), place your left hand on the left side of your head.","mech":"isolation","cat":"strength"},{"n":"Isometric Wipers","eq":"bw","p":"chest","p2":[],"s":["core","shoulders","triceps"],"lv":1,"cue":"Assume a push-up position, supporting your weight on your hands and toes while keeping your body straight. Your hands should be just outside of shoulder width. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"JM Press","eq":"bb","p":"triceps","p2":[],"s":["chest","shoulders"],"lv":1,"cue":"Start the exercise the same way you would a close grip bench press. You will lie on a flat bench while holding a barbell at arms length (fully extended) with the elbows in.","mech":"compound","cat":"strength"},{"n":"Jackknife Sit-Up","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie flat on the floor (or exercise mat) on your back with your arms extended straight back behind your head and your legs extended also. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Janda Sit-Up","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Position your body on the floor in the basic sit-up position; knees to a ninety degree angle with feet flat on the floor and arms either crossed over your chest or to the sides.","mech":"isolation","cat":"strength"},{"n":"Jefferson Squats","eq":"bb","p":"quads","p2":[],"s":["calves","glutes","hams","lowerback","traps"],"lv":2,"cue":"Place a barbell on the floor. Stand in the middle of the bar length wise. Bend down by bending at the knees and keeping your back straight and grasp the front of the bar with your right hand.","mech":"compound","cat":"strength"},{"n":"Jerk Balance","eq":"bb","p":"shoulders","p2":[],"s":["glutes","hams","quads","triceps"],"lv":2,"cue":"This drill helps you learn to drive yourself low enough during the jerk and corrects those who move backward during the movement.","mech":"compound","cat":"olympic weightlifting"},{"n":"Jerk Dip Squat","eq":"bb","p":"quads","p2":[],"s":["core","calves"],"lv":2,"cue":"This movement strengthens the dip portion of the jerk. Begin with the bar racked in the jerk position, with the shoulders forward to create a shelf and the bar lightly contacting the throat.","mech":"compound","cat":"olympic weightlifting"},{"n":"Keg Load","eq":"ot","p":"lowerback","p2":[],"s":["core","biceps","calves","forearms","glutes","hams","back","quads","shoulders","traps"],"lv":2,"cue":"To load kegs, place the desired number a distance from the loading platform, typically 30-50 feet.","mech":"compound","cat":"strongman"},{"n":"Kettlebell Arnold Press","eq":"kb","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"Clean a kettlebell to your shoulder. Clean the kettlebell to your shoulder by extending through the legs and hips as you raise the kettlebell towards your shoulder. The palm should be facing inward.","mech":"compound","cat":"strength"},{"n":"Kettlebell Dead Clean","eq":"kb","p":"hams","p2":[],"s":["calves","glutes","lowerback","quads","traps"],"lv":2,"cue":"Place kettlebell between your feet. To get in the starting position, push your butt back and look straight ahead. Clean the kettlebell to your shoulder.","mech":"compound","cat":"strength"},{"n":"Kettlebell Figure 8","eq":"kb","p":"core","p2":[],"s":["hams","shoulders"],"lv":2,"cue":"Place one kettlebell between your legs and take a wider than shoulder width stance. Bend over by pushing your butt out and keeping your back flat.","mech":"isolation","cat":"strength"},{"n":"Kettlebell Hang Clean","eq":"kb","p":"hams","p2":[],"s":["calves","glutes","lowerback","shoulders","traps"],"lv":2,"cue":"Place kettlebell between your feet. To get in the starting position, push your butt back and look straight ahead. Clean kettlebell to your shoulder.","mech":"compound","cat":"strength"},{"n":"Kettlebell One-Legged Deadlift","eq":"kb","p":"hams","p2":[],"s":["glutes","lowerback"],"lv":2,"cue":"Hold a kettlebell by the handle in one hand. Stand on one leg, on the same side that you hold the kettlebell.","mech":"compound","cat":"strength"},{"n":"Kettlebell Pass Between The Legs","eq":"kb","p":"core","p2":[],"s":["glutes","hams","shoulders"],"lv":2,"cue":"Place one kettlebell between your legs and take a comfortable stance. Bend over by pushing your butt out and keeping your back flat.","mech":"compound","cat":"strength"},{"n":"Kettlebell Pirate Ships","eq":"kb","p":"shoulders","p2":[],"s":["core"],"lv":1,"cue":"With a wide stance, hold a kettlebell with both hands. Allow it to hang at waist level with your arms extended. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Kettlebell Pistol Squat","eq":"kb","p":"quads","p2":[],"s":["calves","glutes","hams","shoulders"],"lv":3,"cue":"Pick up a kettlebell with two hands and hold it by the horns. Hold one leg off of the floor and squat down on the other.","mech":"compound","cat":"strength"},{"n":"Kettlebell Seated Press","eq":"kb","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"Sit on the floor and spread your legs out comfortably. Clean one kettlebell to your shoulder. Press the kettlebell up and out until it is locked out overhead. Return to the starting position.","mech":"compound","cat":"strength"},{"n":"Kettlebell Seesaw Press","eq":"kb","p":"shoulders","p2":[],"s":["triceps"],"lv":2,"cue":"Clean two kettlebells two your shoulders. Press one kettlebell. Lower the kettlebell and immediately press the other kettlebell. Make sure to do the same amount of reps on both sides.","mech":"compound","cat":"strength"},{"n":"Kettlebell Sumo High Pull","eq":"kb","p":"traps","p2":[],"s":["glutes","hams","quads","shoulders"],"lv":2,"cue":"Place a kettlebell on the ground between your feet. Position your feet in a wide stance, and grasp the kettlebell with two hands. Set your hips back as far as possible, with your knees bent.","mech":"compound","cat":"strength"},{"n":"Kettlebell Thruster","eq":"kb","p":"shoulders","p2":[],"s":["quads","triceps"],"lv":2,"cue":"Clean two kettlebells to your shoulders. Clean the kettlebells to your shoulders by extending through the legs and hips as you pull the kettlebells towards your shoulders.","mech":"compound","cat":"strength"},{"n":"Kettlebell Turkish Get-Up (Lunge style)","eq":"kb","p":"shoulders","p2":[],"s":["core","hams","quads","triceps"],"lv":2,"cue":"Lie on your back on the floor and press a kettlebell to the top position by extending the elbow. Bend the knee on the same side as the kettlebell.","mech":"compound","cat":"strength"},{"n":"Kettlebell Turkish Get-Up (Squat style)","eq":"kb","p":"shoulders","p2":[],"s":["core","calves","hams","quads","triceps"],"lv":2,"cue":"Lie on your back on the floor and press a kettlebell to the top position by extending the elbow. Bend the knee on the same side as the kettlebell.","mech":"compound","cat":"strength"},{"n":"Kettlebell Windmill","eq":"kb","p":"core","p2":[],"s":["glutes","hams","shoulders","triceps"],"lv":2,"cue":"Place a kettlebell in front of your lead foot and clean and press it overhead with your opposite arm.","mech":"compound","cat":"strength"},{"n":"Kipping Muscle Up","eq":"ot","p":"back","p2":[],"s":["core","biceps","forearms","shoulders","traps","triceps"],"lv":2,"cue":"Grip the rings using a false grip, with the base of your palms on top of the rings. Begin with a movement swinging your legs backward slightly.","mech":"compound","cat":"strength"},{"n":"Knee/Hip Raise On Parallel Bars","eq":"ot","p":"core","p2":[],"s":[],"lv":1,"cue":"Position your body on the vertical leg raise bench so that your forearms are resting on the pads next to the torso and holding on to the handles. Your arms will be bent at a 90 degree angle.","mech":"isolation","cat":"strength"},{"n":"Knee Tuck Jump","eq":"bw","p":"hams","p2":[],"s":["glutes","calves","quads"],"lv":1,"cue":"Begin in a comfortable standing position with your knees slightly bent. Hold your hands in front of you, palms down with your fingertips together at chest height. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Kneeling Arm Drill","eq":"bw","p":"shoulders","p2":[],"s":["core"],"lv":1,"cue":"This drill helps increase arm efficiency during the run. Begin kneeling, left foot in front, right knee down. Apply pressure through the front heel to keep your glutes and hamstrings activated.","mech":"isolation","cat":"plyometrics"},{"n":"Kneeling Cable Crunch With Alternating Oblique Twists","eq":"cb","p":"core","p2":[],"s":[],"lv":1,"cue":"Connect a rope attachment to a high pulley cable and position a mat on the floor in front of it. Grab the rope with both hands and kneel approximately two feet back from the tower.","mech":"isolation","cat":"strength"},{"n":"Kneeling Cable Triceps Extension","eq":"cb","p":"triceps","p2":[],"s":[],"lv":2,"cue":"Place a bench sideways in front of a high pulley machine. Hold a straight bar attachment above your head with your hands about 6 inches apart with your palms facing down.","mech":"isolation","cat":"strength"},{"n":"Kneeling High Pulley Row","eq":"cb","p":"back","p2":[],"s":["biceps"],"lv":1,"cue":"Select the appropriate weight using a pulley that is above your head. Attach a rope to the cable and kneel a couple of feet away, holding the rope out in front of you with both arms extended.","mech":"compound","cat":"strength"},{"n":"Kneeling Jump Squat","eq":"bb","p":"glutes","p2":[],"s":["calves","hams","quads"],"lv":3,"cue":"Begin kneeling on the floor with a barbell racked across the back of your shoulders, or you can use your body weight for this exercise.","mech":"compound","cat":"olympic weightlifting"},{"n":"Kneeling Single-Arm High Pulley Row","eq":"cb","p":"back","p2":[],"s":["biceps"],"lv":1,"cue":"Attach a single handle to a high pulley and make your weight selection. Kneel in front of the cable tower, taking the cable with one hand with your arm extended. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Kneeling Squat","eq":"bb","p":"glutes","p2":[],"s":["core","hams","lowerback"],"lv":2,"cue":"Set the bar to the proper height in a power rack. Kneel behind the bar; it may be beneficial to put a mat down to pad your knees. Slide under the bar, racking it across the back of your shoulders.","mech":"compound","cat":"powerlifting"},{"n":"Landmine 180's","eq":"bb","p":"core","p2":[],"s":["glutes","lowerback","shoulders"],"lv":1,"cue":"Position a bar into a landmine or securely anchor it in a corner. Load the bar to an appropriate weight.","mech":"compound","cat":"strength"},{"n":"Landmine Linear Jammer","eq":"bb","p":"shoulders","p2":[],"s":["core","calves","chest","hams","quads","triceps"],"lv":2,"cue":"Position a bar into landmine or, lacking one, securely anchor it in a corner. Load the bar to an appropriate weight and position the handle attachment on the bar.","mech":"compound","cat":"strength"},{"n":"Lateral Bound","eq":"bw","p":"glutes","p2":[],"s":["calves","hams","quads"],"lv":1,"cue":"Assume a half squat position facing 90 degrees from your direction of travel. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Lateral Box Jump","eq":"ot","p":"glutes","p2":[],"s":["calves","hams","quads"],"lv":1,"cue":"Assume a comfortable standing position, with a short box positioned next to you. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Lateral Cone Hops","eq":"ot","p":"glutes","p2":[],"s":["calves","hams","quads"],"lv":1,"cue":"Position a number of cones in a row several feet apart. Stand next to the end of the cones, facing 90 degrees to the direction of travel. This will be your starting position.","mech":"compound","cat":"plyometrics"},{"n":"Lateral Raise - With Bands","eq":"bd","p":"shoulders","p2":[],"s":[],"lv":1,"cue":"To begin, stand on an exercise band so that tension begins at arm's length. Grasp the handles using a pronated (palms facing your thighs) grip that is slightly less than shoulder width.","mech":"isolation","cat":"strength"},{"n":"Leg-Over Floor Press","eq":"kb","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":2,"cue":"Lie on the floor with one kettlebell in place on your chest, holding it by the handle.","mech":"compound","cat":"strength"},{"n":"Leg Extensions","eq":"mc","p":"quads","p2":[],"s":[],"lv":1,"cue":"For this exercise you will need to use a leg extension machine. First choose your weight and sit on the machine with your legs under the pad (feet pointed forward) and the hands holding the side bars....","mech":"isolation","cat":"strength"},{"n":"Leg Lift","eq":"bw","p":"glutes","p2":[],"s":["hams"],"lv":1,"cue":"While standing up straight with both feet next to each other at around shoulder width, grab a sturdy surface such as the sides of a squat rack or the top of a chair to brace yourself and keep balance....","mech":"isolation","cat":"strength"},{"n":"Leg Press","eq":"mc","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":1,"cue":"Using a leg press machine, sit down on the machine and place your legs on the platform directly in front of you at a medium (shoulder width) foot stance.","mech":"compound","cat":"strength"},{"n":"Leg Pull-In","eq":"bw","p":"core","p2":[],"s":[],"lv":1,"cue":"Lie on an exercise mat with your legs extended and your hands either palms facing down next to you or under your glutes. Tip: My preference is with the hands next to me.","mech":"compound","cat":"strength"},{"n":"Leverage Chest Press","eq":"mc","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Load an appropriate weight onto the pins and adjust the seat for your height. The handles should be near the bottom or middle of the pectorals at the beginning of the motion.","mech":"compound","cat":"strength"},{"n":"Leverage Deadlift","eq":"mc","p":"quads","p2":[],"s":["glutes","hams"],"lv":1,"cue":"Load the pins to an appropriate weight. Position yourself directly between the handles. Grasp the bottom handles with a comfortable grip, and then lower your hips as you take a breath.","mech":"compound","cat":"strength"},{"n":"Leverage Decline Chest Press","eq":"mc","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Load an appropriate weight onto the pins and adjust the seat for your height. The handles should be near the bottom of the pectorals at the beginning of the motion.","mech":"compound","cat":"strength"},{"n":"Leverage High Row","eq":"mc","p":"back","p2":[],"s":[],"lv":1,"cue":"Load an appropriate weight onto the pins and adjust the seat height so that you can just reach the handles above you. Adjust the knee pad to help keep you down.","mech":"compound","cat":"strength"},{"n":"Leverage Incline Chest Press","eq":"mc","p":"chest","p2":[],"s":["shoulders","triceps"],"lv":1,"cue":"Load an appropriate weight onto the pins and adjust the seat for your height. The handles should be near the top of the pectorals at the beginning of the motion.","mech":"compound","cat":"strength"},{"n":"Leverage Iso Row","eq":"mc","p":"back","p2":[],"s":["biceps"],"lv":1,"cue":"Load an appropriate weight onto the pins and adjust the seat height so that the handles are at chest level. Grasp the handles with either a neutral or pronated grip.","mech":"compound","cat":"strength"},{"n":"Leverage Shoulder Press","eq":"mc","p":"shoulders","p2":[],"s":["triceps"],"lv":1,"cue":"Load an appropriate weight onto the pins and adjust the seat for your height. The handles should be near the top of the shoulders at the beginning of the motion.","mech":"compound","cat":"strength"},{"n":"Leverage Shrug","eq":"mc","p":"traps","p2":[],"s":["forearms"],"lv":1,"cue":"Load the pins to an appropriate weight. Position yourself directly between the handles. Grasp the top handles with a comfortable grip, and then lower your hips as you take a breath.","mech":"isolation","cat":"strength"},{"n":"Linear 3-Part Start Technique","eq":"bw","p":"hams","p2":[],"s":["calves","quads"],"lv":1,"cue":"This drill helps you accelerate as quickly as possible into a sprint from a dead stop. It helps to use a line to start from. Begin with two feet on the line.","mech":"compound","cat":"plyometrics"},{"n":"Linear Acceleration Wall Drill","eq":"bw","p":"hams","p2":[],"s":["calves","glutes","quads"],"lv":1,"cue":"Lean at around 45 degrees against a wall. Your feet should be together, glutes contracted. Begin by lifting your right knee quickly, pausing, and then driving it straight down into the ground.","mech":"compound","cat":"plyometrics"},{"n":"Linear Depth Jump","eq":"ot","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"You will need two boxes or benches spaced a few feet away from each other. Begin by standing on one box facing towards the other platform.","mech":"compound","cat":"plyometrics"},{"n":"Log Lift","eq":"ot","p":"shoulders","p2":[],"s":["core","chest","glutes","hams","lowerback","back","quads","traps","triceps"],"lv":2,"cue":"Begin standing with the log in front of you. Grasp the handles, and begin to clean the log.","mech":"compound","cat":"strongman"},{"n":"London Bridges","eq":"ot","p":"back","p2":[],"s":["biceps","forearms"],"lv":2,"cue":"Attach a climbing rope to a high beam or cross member. Below it, ensure that the smith machine bar is locked in place with the safeties and cannot move.","mech":"compound","cat":"strength"},{"n":"Low Cable Crossover","eq":"cb","p":"chest","p2":[],"s":["shoulders"],"lv":1,"cue":"To move into the starting position, place the pulleys at the low position, select the resistance to be used and grasp a handle in each hand. Step forward, gaining tension in the pulleys.","mech":"isolation","cat":"strength"},{"n":"Low Cable Triceps Extension","eq":"cb","p":"triceps","p2":[],"s":[],"lv":1,"cue":"Select the desired weight and lay down face up on the bench of a seated row machine that has a rope attached to it. Your head should be pointing towards the attachment.","mech":"isolation","cat":"strength"},{"n":"Low Pulley Row To Neck","eq":"cb","p":"shoulders","p2":[],"s":["biceps","back","traps"],"lv":1,"cue":"Sit on a low pulley row machine with a rope attachment. Grab the ends of the rope using a palms-down grip and sit with your back straight and your knees slightly bent.","mech":"compound","cat":"strength"},{"n":"Lunge Pass Through","eq":"kb","p":"hams","p2":[],"s":["calves","glutes","quads"],"lv":2,"cue":"Stand with your torso upright holding a kettlebell in your right hand. This will be your starting position.","mech":"compound","cat":"strength"},{"n":"Lunge Sprint","eq":"mc","p":"quads","p2":[],"s":["calves","glutes","hams"],"lv":2,"cue":"Adjust a bar in a Smith machine to an appropriate height. Position yourself under the bar, racking it across the back of your shoulders.","mech":"compound","cat":"strength"} };
function icon(name,size,color,stroke){
 size=size||20;color=color||"currentColor";stroke=stroke||2;

 return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="'+stroke+'" stroke-linecap="round" stroke-linejoin="round">'+paths+'</svg>';

function ring(pct,size,stroke,color,inner){
 size=size||80;stroke=stroke||7;color=color||"#3B82F6";
 var r=(size-stroke)/2,circ=2*Math.PI*r,off=circ*(1-Math.min(pct,1));
 return '<div class="ring-wrap" style="width:'+size+'px;height:'+size+'px"><svg width="'+size+'" height="'+size+'" style="position:absolute;transform:rotate(-90deg)"><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#1e293b" stroke-width="'+stroke+'"/><circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="'+color+'" stroke-width="'+stroke+'" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" stroke-linecap="round" style="transition:stroke-dashoffset .6s ease"/></svg><div style="position:relative">'+inner+'</div></div>';
}

function freshColor(f){return f>=75?"#10B981":f>=45?"#F59E0B":"#EF4444";}
